<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Pro Elige 8 - Universo Externo & Divisiones</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background: #1a202c; color: #fff; font-size: 11px; }
        .container { background: #2d3748; padding: 15px; border-radius: 10px; max-width: 1350px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* CABECERA */
        .header-box { background: #1a202c; padding: 8px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #4a5568; }
        .resumen-total { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; background: #2d3748; padding: 5px 15px; border-radius: 6px; border: 1px solid #4a5568; }
        .resumen-total b { color: #63b3ed; font-size: 13px; margin-left: 3px; }
        .real-stats { color: #f1c40f !important; border-left: 1px solid #4a5568; padding-left: 15px; font-weight: bold; white-space: nowrap; }

        /* PANEL SUPERIOR */
        .panel-superior { display: grid; grid-template-columns: 1fr 1fr 1fr 160px; gap: 10px; margin-bottom: 10px; }
        .filtro-seccion { background: #1a202c; padding: 10px; border-radius: 6px; border: 1px solid #4a5568; text-align: center; }
        .filtro-seccion h3 { font-size: 9px; color: #63b3ed; text-transform: uppercase; margin: 0 0 8px 0; border-bottom: 1px solid #4a5568; }
        .label-div { font-size: 8px; color: #a0aec0; margin-bottom: 2px; display: block; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; margin-bottom: 5px; }
        .btn-num { background: #2d3748; border: 1px solid #4a5568; color: white; padding: 4px 0; cursor: pointer; border-radius: 2px; font-weight: bold; font-size: 10px; }
        .btn-num.active { background: #48bb78; border-color: #68d391; box-shadow: 0 0 5px rgba(72,187,120,0.4); }

        /* ACCIONES */
        .action-grid { display: flex; flex-direction: column; gap: 4px; min-width: 150px; }
        .btn-main { border: none; padding: 6px; cursor: pointer; font-weight: bold; border-radius: 4px; color: white; font-size: 10px; width: 100%; transition: 0.2s; }
        .btn-gen { background: #38a169; } .btn-esc { background: #3182ce; } .btn-save { background: #d69e2e; } .btn-open { background: #805ad5; }
        .btn-load-txt { background: #4a5568; } .btn-download { background: #2b6cb0; }

        /* TABLA */
        table { width: 100%; border-collapse: collapse; background: #1a202c; margin-bottom: 10px; font-size: 10px; }
        th, td { padding: 3px; text-align: center; border: 1px solid #4a5568; }
        th { background: #2d3748; color: #a0aec0; }
        input { background: #1a202c; border: 1px solid #4a5568; color: #fff; text-align: center; border-radius: 2px; }
        .eq-input { width: 140px; text-align: left; padding-left: 5px; color: #f1c40f; }
        
        #listadoApuestas { width: 100%; height: 250px; font-family: monospace; background: #000; color: #00ff00; padding: 10px; border-radius: 5px; overflow-y: scroll; border: 1px solid #4a5568; }
        .linea { border-bottom: 1px solid #2d3748; padding: 4px; display: flex; justify-content: space-between; align-items: center; }
        .ganadora { background: #2d5a27 !important; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div><b>Jornada:</b> <input type="number" id="jornada" value="55" style="width:30px"></div>
        <div>
            <b>H:</b> 
            <select id="selHuecos" style="background:#2d3748; color:#fff; border:1px solid #4a5568; border-radius:4px;">
                <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            </select>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; gap: 10px;">
            <b>Cob:</b> <input type="range" id="fPct" min="1" max="100" value="100" oninput="document.getElementById('pctVal').innerText = this.value + '%'" style="flex-grow:1">
            <span id="pctVal" style="font-weight:bold; color:#63b3ed; width:35px;">100%</span>
        </div>
        <div class="resumen-total">
            <div>Filtradas:<b id="outF">0</b></div>
            <div>Apuestas:<b id="outR">0</b></div>
            <div>Coste:<b id="outC">0.00€</b></div>
            <div>Máx Ac:<b id="outMax">-</b></div>
            <div id="outJuego" style="color:#63b3ed; font-weight:bold; margin-left:10px;">0T, 0D</div>
            <div class="real-stats">REAL -> U:<b id="rUnos">-</b>|B:<b id="rBases">-</b>|D:<b id="rDificiles">-</b></div>
        </div>
    </div>

    <div class="panel-superior">
        <div class="filtro-seccion">
            <h3>Unos</h3>
            <span class="label-div">DIV 1 (P1-8)</span><div id="gridUnos1" class="btn-grid"></div>
            <span class="label-div">DIV 2 (P9-14)</span><div id="gridUnos2" class="btn-grid"></div>
        </div>
        <div class="filtro-seccion">
            <h3>Bases</h3>
            <span class="label-div">DIV 1 (P1-8)</span><div id="gridBases1" class="btn-grid"></div>
            <span class="label-div">DIV 2 (P9-14)</span><div id="gridBases2" class="btn-grid"></div>
        </div>
        <div class="filtro-seccion">
            <h3>Difíciles</h3>
            <span class="label-div">DIV 1 (P1-8)</span><div id="gridDificiles1" class="btn-grid"></div>
            <span class="label-div">DIV 2 (P9-14)</span><div id="gridDificiles2" class="btn-grid"></div>
        </div>
        <div class="action-grid">
            <button class="btn-main btn-gen" onclick="generar()">GENERAR</button>
            <button class="btn-main btn-esc" onclick="escrutar()">ESCRUTAR</button>
            <button class="btn-main btn-load-txt" onclick="document.getElementById('inputUniverso').click()">CARGAR TXT</button>
            <button class="btn-main btn-save" onclick="guardar()">GUARDAR</button>
            <button class="btn-main btn-open" onclick="document.getElementById('inputOpen').click()">ABRIR</button>
            <button class="btn-main btn-download" onclick="descargarTxtHuecos()">BAJAR HUECO</button>
            
            <input type="file" id="inputUniverso" style="display:none" accept=".txt" onchange="cargarUniversoExterno(event)">
            <input type="file" id="inputOpen" style="display:none" onchange="abrir(event)">
        </div>
    </div>

    <table id="mainTable">
        <thead>
            <tr><th>P.</th><th>Equipos</th><th>Prono</th><th>E8</th><th>C1</th><th>CX</th><th>C2</th><th>B/D</th><th style="background:#d69e2e">REAL</th></tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
    <div id="listadoApuestas"></div>
</div>

<script>
let apuestasGlobal = [];
let indicesE8 = [];
let universoExterno = [];
const filtros = { u1: new Set(), u2: new Set(), b1: new Set(), b2: new Set(), d1: new Set(), d2: new Set() };

// --- INICIALIZACIÓN ---
window.onload = () => {
    const body = document.getElementById('tablaBody');
    for(let i=1; i<=14; i++) {
        body.innerHTML += `<tr>
            <td>${i}</td>
            <td><input type="text" id="eq${i}" class="eq-input" placeholder="Partido ${i}"></td>
            <td><input type="text" id="p${i}" value="1X2" oninput="actualizarBD()" style="width:40px"></td>
            <td><input type="checkbox" id="chk${i}" ${i<=8?'checked':''} onchange="actualizarBD()"></td>
            <td><input type="number" step="0.1" id="q1_${i}" value="1.8" oninput="actualizarBD()" style="width:35px"></td>
            <td><input type="number" step="0.1" id="qX_${i}" value="3.2" oninput="actualizarBD()" style="width:35px"></td>
            <td><input type="number" step="0.1" id="q2_${i}" value="4.5" oninput="actualizarBD()" style="width:35px"></td>
            <td id="inf${i}" style="font-size:9px; font-weight:bold; color:#63b3ed;">-</td>
            <td><input type="text" id="res${i}" style="width:20px; background:#2d3748; border:none; color:white;"></td>
        </tr>`;
    }
    crearBotones();
    actualizarBD();
};

function crearBotones() {
    const conf = [['Unos','u'], ['Bases','b'], ['Dificiles','d']];
    conf.forEach(([lab, key]) => {
        [['1', 8], ['2', 6]].forEach(([div, max]) => {
            const container = document.getElementById('grid'+lab+div);
            if(!container) return;
            container.innerHTML = '';
            for(let i=0; i<=max; i++) {
                let btn = document.createElement('button');
                btn.innerText = i; btn.className = 'btn-num';
                if(filtros[key+div].has(i)) btn.classList.add('active');
                btn.onclick = () => {
                    filtros[key+div].has(i) ? filtros[key+div].delete(i) : filtros[key+div].add(i);
                    btn.classList.toggle('active');
                };
                container.appendChild(btn);
            }
        });
    });
}

function actualizarBD() {
    let sel = []; indicesE8 = []; let t=0, d=0;
    for(let i=1; i<=14; i++){
        const elQ1 = document.getElementById(`q1_${i}`);
        if(!elQ1) continue;
        let q1=parseFloat(elQ1.value)||0, qX=parseFloat(document.getElementById(`qX_${i}`).value)||0, q2=parseFloat(document.getElementById(`q2_${i}`).value)||0;
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        document.getElementById(`inf${i}`).innerText = `B:${qs[0].s}|D:${qs[2].s}`;
        if(document.getElementById(`chk${i}`).checked){
            let pV = document.getElementById(`p${i}`).value.toUpperCase();
            if(pV.length===3) t++; else if(pV.length===2) d++;
            sel.push({ p: pV.split(''), b: qs[0].s, d: qs[2].s, realIdx: i-1 });
            indicesE8.push(i);
        }
    }
    document.getElementById('outJuego').innerText = `${t}T, ${d}D`;
    return sel;
}

function cargarUniversoExterno(event) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split(/\r?\n/).map(l => l.trim().toUpperCase()).filter(l => l.length >= 14);
        universoExterno = lines;
        alert("Cargadas " + lines.length + " combinaciones externas.");
    };
    reader.readAsText(file);
}

function generar() {
    const sel = actualizarBD();
    if(!sel.length) return alert("Selecciona partidos");
    const target = parseInt(document.getElementById('fPct').value)/100;
    const nH = parseInt(document.getElementById('selHuecos').value);
    
    let uni = [];
    if(universoExterno.length > 0) {
        // MODO EXTERNO
        universoExterno.forEach(linea => {
            let u1=0, b1=0, d1=0, u2=0, b2=0, d2=0, combo = [];
            sel.forEach(partido => {
                let s = linea[partido.realIdx]; combo.push(s);
                let pNum = partido.realIdx + 1;
                if(pNum <= 8) {
                    if(s==='1') u1++; if(s===partido.b) b1++; if(s===partido.d) d1++;
                } else {
                    if(s==='1') u2++; if(s===partido.b) b2++; if(s===partido.d) d2++;
                }
            });
            const ok1 = (filtros.u1.size===0 || filtros.u1.has(u1)) && (filtros.b1.size===0 || filtros.b1.has(b1)) && (filtros.d1.size===0 || filtros.d1.has(d1));
            const ok2 = (filtros.u2.size===0 || filtros.u2.has(u2)) && (filtros.b2.size===0 || filtros.b2.has(b2)) && (filtros.d2.size===0 || filtros.d2.has(d2));
            if(ok1 && ok2) uni.push(combo.join(''));
        });
    } else {
        // MODO DIRECTO
        function gen(idx, comb, u1, b1, d1, u2, b2, d2) {
            if(idx === sel.length) {
                const ok1 = (filtros.u1.size===0 || filtros.u1.has(u1)) && (filtros.b1.size===0 || filtros.b1.has(b1)) && (filtros.d1.size===0 || filtros.d1.has(d1));
                const ok2 = (filtros.u2.size===0 || filtros.u2.has(u2)) && (filtros.b2.size===0 || filtros.b2.has(b2)) && (filtros.d2.size===0 || filtros.d2.has(d2));
                if(ok1 && ok2) uni.push(comb.join(''));
                return;
            }
            sel[idx].p.forEach(s => {
                let nu1=u1, nb1=b1, nd1=d1, nu2=u2, nb2=b2, nd2=d2;
                let pNum = sel[idx].realIdx + 1;
                if(pNum <= 8) {
                    if(s==='1') nu1++; if(s===sel[idx].b) nb1++; if(s===sel[idx].d) nd1++;
                } else {
                    if(s==='1') nu2++; if(s===sel[idx].b) nb2++; if(s===sel[idx].d) nd2++;
                }
                gen(idx+1, [...comb, s], nu1, nb1, nd1, nu2, nb2, nd2);
            });
        }
        gen(0, [], 0,0,0, 0,0,0);
    }

    if(!uni.length) return alert("Sin resultados con filtros.");
    document.getElementById('outF').innerText = uni.length;

    // REDUCCIÓN
    let noCub = new Set(uni); apuestasGlobal = [];
    const hCombos = [];
    function combH(s, a) { if(a.length===nH){hCombos.push([...a]);return;} for(let i=s;i<sel.length;i++) combH(i+1, [...a,i]); }
    combH(0, []);

    let pool = Array.from(noCub);
    while(noCub.size > uni.length*(1-target) && pool.length > 0) {
        let mejorA = "", mejorHS = null, maxC = -1, mejoresC = [];
        for(let bStr of pool.slice(0, 250)) {
            for(let hs of hCombos) {
                let cur = [];
                function check(hI, cb) {
                    if(hI===nH) { let s = cb.join(''); if(noCub.has(s)) cur.push(s); return; }
                    ['1','X','2'].forEach(sig => { let ncb = [...cb]; ncb[hs[hI]] = sig; check(hI+1, ncb); });
                }
                check(0, bStr.split(''));
                if(cur.length > maxC) { maxC = cur.length; mejorA = bStr; mejorHS = hs; mejoresC = cur; }
                if(maxC >= Math.pow(3, nH)) break;
            }
            if(maxC >= Math.pow(3, nH)) break;
        }
        if(maxC <= 0) break;
        mejoresC.forEach(s => noCub.delete(s));
        let v = mejorA.split(''); mejorHS.forEach(idx => v[idx] = "_");
        apuestasGlobal.push({ s: v.join(''), ac: 0 });
        pool = pool.filter(a => noCub.has(a));
    }
    render();
}

function render() {
    let max = apuestasGlobal.length ? Math.max(...apuestasGlobal.map(a => a.ac)) : 0;
    document.getElementById('outR').innerText = apuestasGlobal.length;
    document.getElementById('outC').innerText = (apuestasGlobal.length*0.75).toFixed(2)+"€";
    document.getElementById('outMax').innerText = max;

    document.getElementById('listadoApuestas').innerHTML = apuestasGlobal.map((a, i) => `
        <div class="linea ${a.ac > 0 && a.ac === max ? 'ganadora' : ''}">
            <span>[${i+1}] ${a.s.split('').join(' ')}</span>
            <span style="color:#63b3ed; font-weight:bold;">${a.ac} ac.</span>
        </div>`).join('');
}

function escrutar() {
    if(!apuestasGlobal.length) return;
    let rU=0, rB=0, rD=0, realArr = [];
    for(let i=1; i<=14; i++){
        let v = (document.getElementById(`res${i}`).value || "").toUpperCase();
        realArr.push(v);
        if(document.getElementById(`chk${i}`).checked && v !== ""){
            if(v==='1') rU++;
            let qs = [{s:'1',v:parseFloat(document.getElementById(`q1_${i}`).value)},{s:'X',v:parseFloat(document.getElementById(`qX_${i}`).value)},{s:'2',v:parseFloat(document.getElementById(`q2_${i}`).value)}].sort((a,b)=>a.v-b.v);
            if(v===qs[0].s) rB++; if(v===qs[2].s) rD++;
        }
    }
    document.getElementById('rUnos').innerText = rU; document.getElementById('rBases').innerText = rB; document.getElementById('rDificiles').innerText = rD;
    
    apuestasGlobal.forEach(a => {
        let c = 0, s = a.s.split('');
        for(let j=0; j<s.length; j++) if(s[j] !== "_" && s[j] === realArr[indicesE8[j]-1]) c++;
        a.ac = c;
    });
    apuestasGlobal.sort((a,b) => b.ac - a.ac);
    render();
}

function guardar() {
    let d = { f: { u1:[...filtros.u1], u2:[...filtros.u2], b1:[...filtros.b1], b2:[...filtros.b2], d1:[...filtros.d1], d2:[...filtros.d2], p:document.getElementById('fPct').value, h:document.getElementById('selHuecos').value }, c: [] };
    for(let i=1; i<=14; i++){
        d.c.push({ eq:document.getElementById(`eq${i}`).value, p:document.getElementById(`p${i}`).value, q1:document.getElementById(`q1_${i}`).value, qX:document.getElementById(`qX_${i}`).value, q2:document.getElementById(`q2_${i}`).value, r:document.getElementById(`res${i}`).value, chk:document.getElementById(`chk${i}`).checked });
    }
    let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:"application/json"})); a.download="elige8.json"; a.click();
}

function abrir(ev) {
    if(!ev.target.files.length) return;
    let r = new FileReader();
    r.onload = (e) => {
        let d = JSON.parse(e.target.result); let f = d.f;
        filtros.u1=new Set(f.u1); filtros.u2=new Set(f.u2); filtros.b1=new Set(f.b1); filtros.b2=new Set(f.b2); filtros.d1=new Set(f.d1); filtros.d2=new Set(f.d2);
        document.getElementById('fPct').value = f.p; document.getElementById('selHuecos').value = f.h || 2;
        crearBotones();
        d.c.forEach((c, i) => { 
            let idx=i+1; if(document.getElementById(`eq${idx}`)) document.getElementById(`eq${idx}`).value=c.eq||"";
            document.getElementById(`p${idx}`).value=c.p; document.getElementById(`q1_${idx}`).value=c.q1;
            document.getElementById(`qX_${idx}`).value=c.qX; document.getElementById(`q2_${idx}`).value=c.q2;
            document.getElementById(`res${idx}`).value=c.r; document.getElementById(`chk${idx}`).checked=c.chk;
        });
        actualizarBD();
    };
    r.readAsText(ev.target.files[0]);
}

function descargarTxtHuecos() {
    if (!apuestasGlobal.length) return alert("Sin apuestas.");
    const contenido = apuestasGlobal.map(ap => ap.s.split('').join(' ')).join('\n');
    const blob = new Blob([contenido], { type: 'text/plain' });
    const numJ = document.getElementById('jornada').value || "X";
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `quiniela_elige8_J${numJ}_reducida.txt`;
    a.click();
}
</script>
</body>
</html>
