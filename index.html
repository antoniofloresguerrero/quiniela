<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reductor Elige 8 - Profesional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 10px; font-size: 12px; }
        .container { max-width: 1150px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .seccion-filtros { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .filtro-card { background: #334155; padding: 15px; border-radius: 10px; border-bottom: 4px solid #38bdf8; }
        .btn-f { width: 24px; height: 24px; background: #1e293b; border: 1px solid #475569; color: #fff; cursor: pointer; border-radius: 4px; margin: 1px; }
        .btn-f.active { background: #38bdf8; color: #000; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #0f172a; color: #38bdf8; padding: 8px; border: 1px solid #334155; }
        td { padding: 4px; border: 1px solid #334155; text-align: center; }
        .in-equipo { background: #0f172a; border: 1px solid #475569; color: #fff; width: 90px; }
        .in-cuota { width: 40px; background: #0f172a; color: #fbbf24; border: 1px solid #475569; text-align: center; }
        .in-pro { width: 55px; text-align: center; font-weight: bold; background: #000; color: #38bdf8; border: 2px solid #38bdf8; border-radius: 4px; }
        .panel-control { background: #0f172a; padding: 20px; border-radius: 10px; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;}
        .btn-main { padding: 10px 18px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-sim { background: #fbbf24; color: #000; }
        .btn-clear { background: #ef4444; color: #fff; }
        .btn-save { background: #22c55e; color: #fff; }
        .btn-open { background: #a855f7; color: #fff; }
        .btn-gen { background: #38bdf8; color: #000; }
        .btn-exp { background: #f8fafc; color: #000; }
        #zona-listado { margin-top: 20px; display: none; }
        #listaColumnas { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-height: 200px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 10px; }
        .mini-col { width: 90px; background: #334155; padding: 8px; border-radius: 5px; font-size: 10px; border-left: 3px solid #38bdf8; }
        #zona-tarjeta { margin-top: 30px; display: none; text-align: center; }
        .card-wrapper { display: flex; justify-content: center; padding: 15px; }
        .col-box { width: 280px; background: #fff; color: #1e293b; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-left: 8px solid #38bdf8; transition: 0.3s; }
        .fade-out { opacity: 0; transform: translateY(10px); }
        .linea { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 12px; }
        .elige8-row { background:red; color:white;font-weight: bold; }
        .elige8-row b { color: white !important; font-size: 14px; }

    </style>
</head>
<body>

<div class="container">
   <div style="text-align: center; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px;">
   <div class="panel-control">
        
        <button class="btn-main btn-save" onclick="exportarConfig()">💾 Guardar JSON</button>
        <input type="file" id="fileIn" style="display:none" onchange="importarConfig(event)" accept=".json">
        <button class="btn-main btn-open" onclick="document.getElementById('fileIn').click()">📂 Abrir JSON</button>
        <button class="btn-main btn-gen" onclick="ejecutar(false)">🚀 Generar y Ver</button>
        <button class="btn-main btn-exp" onclick="ejecutar(true)">📥 Exportar TXT</button>
	<button class="btn-main btn-sim" onclick="simularJornada()">Simular</button>
        <button class="btn-main btn-clear" onclick="borrarTodo()">Limpiar</button>
    </div>
   
	
    </div>
<div style="text-align: center; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px;">
    <div>Directas: <span id="stDirecto" style="color:#38bdf8; font-weight:bold;font-size: 20px">0</span></div>
    <div>Filtradas: <span id="stFiltrado" style="color:#22c55e; font-weight:bold;font-size: 20px">0</span></div>
</div>

    <div class="seccion-filtros">
        <div class="filtro-card">
    <!-- Parte izquierda: Controles -->
    <div class="filtros-controles">
        <h3>Filtros 1ª DIV (P1-P8)</h3>
        <div class="grupo"><label>Número de "1"</label><div id="f-u-1"></div></div>
        <div class="grupo"><label>Signo BASE:</label><div id="f-b-1"></div></div>
        <div class="grupo"><label>Signo DIFÍCIL:</label><div id="f-d-1"></div></div>
    </div>

    <!-- Parte derecha: Resumen visual -->
    <div class="resumen-seleccion" id="resumen-1">
        <!-- Los círculos se generarán aquí -->
        <div class="resumen-fila" id="resumen-u-1"></div>
        <div class="resumen-fila" id="resumen-b-1"></div>
        <div class="resumen-fila" id="resumen-d-1"></div>
    </div>
</div>
        <div class="filtro-card">
            <h3>Filtros 2ª DIV (P9-P14)</h3>
            <div class="grupo"><label>Número de "1"</label><div id="f-u-2"></div></div>
            <div class="grupo"><label>Signo BASE:</label><div id="f-b-2"></div></div>
            <div class="grupo"><label>Signo DIFÍCIL:</label><div id="f-d-2"></div></div>
        </div>
    </div>

    <table>
        <thead>
            <tr><th>#</th><th>Equipos</th><th>1</th><th>X</th><th>2</th><th>B/D</th><th>Pronóstico</th><th>E8</th></tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>

 

    <div id="zona-listado">
        <h3 style="text-align: center; color:#38bdf8">LISTADO COMPLETO</h3>
        <div id="listaColumnas"></div>
    </div>

    <div id="zona-tarjeta">
        <div class="card-wrapper"><div id="cardBox" class="col-box"></div></div>
        <div style="display:flex; justify-content:center; gap:15px; align-items:center">
            <button class="btn-main" style="background:#334155; color:#fff" id="btnA" onclick="mover(-1)">ANT</button>
            <span id="txtPag" style="font-weight:bold"></span>
            <button class="btn-main" style="background:#334155; color:#fff" id="btnS" onclick="mover(1)">SIG</button>
        </div>
    </div>
</div>

<script>
    const partidoInfo = Array(16).fill().map(() => ({ base: '', dif: '', favorito: '1' }));
    let validas = [];
    let idx = 0;

    function init() {
        // Crear botones de filtros
        ['u','b','d'].forEach(t => {
            crearBtns(`f-${t}-1`, 8);
            crearBtns(`f-${t}-2`, 6);
        });

        // Generar filas de la tabla
        const tbody = document.getElementById('cuerpoTabla');
        for(let i=1; i<=15; i++) {
            tbody.innerHTML += `
                <tr data-id="${i}">
                    <td><b>${i}</b></td>
                    <td><input id="L${i}" class="in-equipo" placeholder="Local"> <input id="V${i}" class="in-equipo" placeholder="Visitante"></td>
                    <td><input type="number" step="0.1" class="in-cuota" id="c1_${i}" oninput="analizar(${i})"></td>
                    <td><input type="number" step="0.1" class="in-cuota" id="cX_${i}" oninput="analizar(${i})"></td>
                    <td><input type="number" step="0.1" class="in-cuota" id="c2_${i}" oninput="analizar(${i})"></td>
                    <td id="an_${i}" style="font-size:9px">-</td>
                    <td><input type="text" class="in-pro" id="pro${i}" oninput="contarDirecto()"></td>
                    <td>${i < 15 ? `<input type="checkbox" class="check-e8" onchange="contarDirecto()">` : '-'}</td>
                </tr>`;
        }
    }

    function crearBtns(id, max) {
        const cont = document.getElementById(id);
        if(!cont) return;
        for(let i=0; i<=max; i++) {
            const b = document.createElement('button');
            b.className = 'btn-f'; b.innerText = i;
            b.onclick = function() { this.classList.toggle('active'); };
            cont.appendChild(b);
        }
    }

    function analizar(i) {
        const v1 = parseFloat(document.getElementById(`c1_${i}`).value) || 99, 
              vX = parseFloat(document.getElementById(`cX_${i}`).value) || 99, 
              v2 = parseFloat(document.getElementById(`c2_${i}`).value) || 99;
        if(v1 === 99 && vX === 99 && v2 === 99) return;
        
        const min = Math.min(v1, vX, v2), max = Math.max(v1, vX, v2);
        partidoInfo[i].base = (v1==min?'1':(vX==min?'X':'2'));
        partidoInfo[i].dif = (v2==max?'2':(vX==max?'X':'1'));
        partidoInfo[i].favorito = (v1==min?'1':(vX==min?'X':'2'));
        document.getElementById(`an_${i}`).innerHTML = `B:${partidoInfo[i].base} D:${partidoInfo[i].dif}`;
    }

    function contarDirecto() {
        const checks = document.querySelectorAll('.check-e8:checked');
        let total = (checks.length === 8) ? 1 : 0;
        if(total) {
            checks.forEach(cb => {
                const id = cb.closest('tr').dataset.id;
                const val = document.getElementById(`pro${id}`).value.toUpperCase();
                total *= (val.match(/[1X2]/g) || []).length || 1;
            });
        }
        document.getElementById('stDirecto').innerText = total;
    }

    function ejecutar(exp) {
        const e8s = Array.from(document.querySelectorAll('.check-e8:checked')).map(cb => cb.closest('tr'));
        if(e8s.length !== 8) return alert("Selecciona exactamente 8 partidos para el Elige 8");
        
        const f = {};
        ['u','b','d'].forEach(t => {
            [1, 2].forEach(d => {
                f[`${t}${d}`] = Array.from(document.getElementById(`f-${t}-${d}`).querySelectorAll('.active')).map(b => parseInt(b.innerText));
            });
        });
        
        const matriz = e8s.map(tr => {
            const id = parseInt(tr.dataset.id);
            return { id, s: document.getElementById(`pro${id}`).value.toUpperCase().match(/[1X2]/g) || [] };
        });

        const gen = (a) => a.reduce((x, y) => x.flatMap(d => y.s.map(s => [...d, {id: y.id, s}])), [[]]);
        validas = gen(matriz).filter(col => {
            let u1=0, b1=0, d1=0, u2=0, b2=0, d2=0;
            col.forEach(p => {
                const div = p.id <= 8 ? 1 : 2;
                if(p.s === '1') (div === 1 ? u1++ : u2++);
                if(p.s === partidoInfo[p.id].base) (div === 1 ? b1++ : b2++);
                if(p.s === partidoInfo[p.id].dif) (div === 1 ? d1++ : d2++);
            });
            const ok = (v, arr) => arr.length === 0 || arr.includes(v);
            return ok(u1, f.u1) && ok(b1, f.b1) && ok(d1, f.d1) && ok(u2, f.u2) && ok(b2, f.b2) && ok(d2, f.d2);
        });

        document.getElementById('stFiltrado').innerText = validas.length;
        if(validas.length > 0) {
            idx = 0; 
            document.getElementById('zona-listado').style.display = 'block'; 
            document.getElementById('zona-tarjeta').style.display = 'block';
            document.getElementById('listaColumnas').innerHTML = validas.map((c, i) => `<div class="mini-col"><b>AP ${i+1}</b><br>${c.map(p => `P${p.id}:${p.s}`).join('<br>')}</div>`).join('');
            pitar();
        } else alert("Sin resultados");
    }

    function pitar() {
        const box = document.getElementById('cardBox');
        box.classList.add('fade-out');
        setTimeout(() => {
            let h = `<h3 style="margin:0">Quiniela (Elige 8 en rojo) nº ${idx+1}</h3><hr>`;
            const e8Ids = validas[idx].map(p => p.id);
            for(let i=1; i<=15; i++) {
                const esE8 = e8Ids.includes(i);
                const signo = esE8 ? validas[idx].find(p => p.id === i).s : (partidoInfo[i].favorito || "1");
                const nombre = document.getElementById('L'+i).value || 'Partido '+i;
		const nombref = document.getElementById('V'+i).value || 'Partido '+i;
                h += `<div class="linea ${esE8 ? 'elige8-row' : ''}"><span>${i}. ${nombre} - ${nombref}</span><b>${signo}</b></div>`;
            }
            box.innerHTML = h; box.classList.remove('fade-out');
            document.getElementById('txtPag').innerText = `${idx+1} / ${validas.length}`;
            document.getElementById('btnA').disabled = (idx === 0);
            document.getElementById('btnS').disabled = (idx === validas.length-1);
	    
        }, 200);
    }

    function mover(d) { idx += d; pitar(); }

    function exportarConfig() {
        const d = [];
        for(let i=1; i<=15; i++) {
            d.push({
                id: i, 
                L: document.getElementById('L'+i).value, 
                V: document.getElementById('V'+i).value, 
                c1: document.getElementById('c1_'+i).value, 
                cX: document.getElementById('cX_'+i).value, 
                c2: document.getElementById('c2_'+i).value, 
                pro: document.getElementById('pro'+i).value, 
                e8: i<15 ? document.querySelectorAll('.check-e8')[i-1].checked : false
            });
        }
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:'application/json'})); 
        a.download='quiniela_config.json'; a.click();
    }

    function importarConfig(ev) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = JSON.parse(e.target.result);
            data.forEach(d => {
                document.getElementById('L'+d.id).value = d.L; 
                document.getElementById('V'+d.id).value = d.V;
                document.getElementById('c1_'+d.id).value = d.c1; 
                document.getElementById('cX_'+d.id).value = d.cX; 
                document.getElementById('c2_'+d.id).value = d.c2;
                document.getElementById('pro'+d.id).value = d.pro; 
                if(d.id < 15) document.querySelectorAll('.check-e8')[d.id-1].checked = d.e8;
                analizar(d.id);
            });
            contarDirecto();
        };
        reader.readAsText(ev.target.files[0]);
    }

    function simularJornada() {
        for(let i=1; i<=15; i++) {
            document.getElementById('L'+i).value="Local "+i; 
            document.getElementById('V'+i).value="Visitante "+i;
            document.getElementById('c1_'+i).value=(Math.random()+1.1).toFixed(1); 
            document.getElementById('cX_'+i).value=(Math.random()+2).toFixed(1); 
            document.getElementById('c2_'+i).value=(Math.random()+3).toFixed(1);
            analizar(i);
            if(i<=8){ 
                document.getElementById('pro'+i).value=(i<3?"1X":"1"); 
                document.querySelectorAll('.check-e8')[i-1].checked=true; 
            }
        }
        contarDirecto();
    }

    function borrarTodo() { if(confirm("¿Borrar todos los datos?")) location.reload(); }
    
    // Iniciar script
    window.onload = init;
</script>
</body>
</html>
