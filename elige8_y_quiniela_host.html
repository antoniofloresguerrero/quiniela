<script>
    let validas = [], idx = 0;

    window.onload = () => { generarBotonesFiltro(); cargarDatos(); };

 function generarBotonesFiltro() {
    const config = [
        { id: 'btns-u-1', max: 8 }, { id: 'btns-b-1', max: 8 }, { id: 'btns-d-1', max: 8 },
        { id: 'btns-u-2', max: 6 }, { id: 'btns-b-2', max: 6 }, { id: 'btns-d-2', max: 6 }
    ];
    config.forEach(c => {
        const div = document.getElementById(c.id);
        if (!div) return;
        div.innerHTML = "";
        for (let i = 0; i <= c.max; i++) {
            // Aquí se crea la variable btn, solo existe dentro de este bucle for
            const btn = document.createElement("button"); 
            btn.className = "btn-f";
            btn.innerText = i;

            // El evento onclick DEBE estar aquí dentro
            btn.onclick = function() {
                this.classList.toggle('active');
                const grupo = this.closest('.grupo-f');
                const visor = grupo.querySelector('.res-v');
                const activos = Array.from(grupo.querySelectorAll('.btn-f.active'))
                                     .map(b => b.innerText).sort().join('');
                
                visor.innerText = activos ? grupo.getAttribute('data-label') + activos : "";
                
                // Llamamos a guardar filtros cada vez que se pulsa
                guardarFiltros(); 
            };
            div.appendChild(btn);
        }
    });
}




  


function aplicarFiltrosVisuales(f) {
    // Limpiamos todo rastro anterior
    document.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));

    // Marcamos botones activos (u1, b1, d1, u2, b2, d2)
    const grupos = ['u', 'b', 'd'];
    const divs = [1, 2];

    grupos.forEach(t => {
        divs.forEach(d => {
            const clave = `${t}${d}`;
            if (f[clave] && Array.from(f[clave]).length > 0) {
                const contenedor = document.getElementById(`btns-${t}-${d}`);
                if (contenedor) {
                    f[clave].forEach(num => {
                        const btn = Array.from(contenedor.querySelectorAll('.btn-f'))
                                         .find(b => b.innerText == num);
                        if (btn) btn.classList.add('active');
                    });
                }
            }
        });
    });

    // Restaurar Slider y Reducción
    if (f.pct) {
        document.getElementById('rangePct').value = f.pct;
        document.getElementById('valPct').innerText = f.pct + "%";
    }
    if (f.red) document.getElementById('selReduccion').value = f.red;

    // Actualizar los textos de los visores (los de "Unos: 234")
    actualizarVisoresTexto();
}

function actualizarVisoresTexto() {
    document.querySelectorAll('.grupo-f').forEach(grupo => {
        const visor = grupo.querySelector('.res-v');
        if (visor) {
            const activos = Array.from(grupo.querySelectorAll('.btn-f.active'))
                                 .map(b => b.innerText).sort().join('');
            visor.innerText = activos ? grupo.getAttribute('data-label') + activos : "";
        }
    });
}


  function poblarTabla(partidos) {
    const tbody = document.getElementById('cuerpoTabla');
    if (!tbody) return console.error("No existe cuerpoTabla");

    let h = ''; 
    partidos.forEach((p, i) => {
        const n = i + 1;
        if (n > 15) return;

        // Normalizar los valores que vienen del servidor o del modo local
        const v1 = p.c1 || p.cuota1 || 0;
        const vX = p.cx || p.cX || p.cuotax || p.cuotaX || 0;
        const v2 = p.c2 || p.cuota2 || 0;

        if (n <= 14) {
            h += `<tr id="fila_${n}">
                <td><b>${n}</b></td>
                <td>
                    <input class="in-equipo" id="L${n}" value="${p.local || ''}"> 
                    <input class="in-equipo" id="V${n}" value="${p.visitante || ''}">
                </td>
                <td><input type="number" step="0.1" class="in-cuota" id="c1_${n}" value="${v1}" oninput="if(window.analizar) analizar(${n})"></td>
                <td><input type="number" step="0.1" class="in-cuota" id="cX_${n}" value="${vX}" oninput="if(window.analizar) analizar(${n})"></td>
                <td><input type="number" step="0.1" class="in-cuota" id="c2_${n}" value="${v2}" oninput="if(window.analizar) analizar(${n})"></td>
                <td id="an_${n}" style="color:#ffcc00; font-weight:bold">-</td>
                <td><input type="text" class="in-pro" id="pro${n}" value="${p.pronostico || ''}" oninput="contarDoblesTriples()"></td>
                <td><input type="text" class="in-pro" id="pro${n}" value="${p.pronostico || ''}" oninput="contarDoblesTriples()"></td>

                <td><input type="checkbox" class="check-e8" id="e8_${n}" ${p.elige8 ? 'checked' : ''}></td>
                <td><input type="text" class="in-res-real" id="R${n}" value="${p.resultado_real || ''}" 
    oninput="if(window.pitar) pitar(); if(window.ejecutarEscrutinio) ejecutarEscrutinio();" 
    onchange="autoGuardar(${n})"></td>
                <td id="res_${n}" style="color:#00d4ff; font-weight:bold">-</td>
            </tr>`;
        }
    });

    tbody.innerHTML = h;
    console.log("Tabla poblada con cuotas:", partidos.length);
    
    // Ejecutamos análisis inicial con un pequeño retraso
    setTimeout(() => {
        for(let j=1; j<=14; j++) {
            if(document.getElementById(`c1_${j}`) && window.analizar) analizar(j);
            
        }
         // --- AÑADE ESTA LÍNEA AQUÍ ---
        if (window.contarDoblesTriples) contarDoblesTriples();
    }, 500);
}

    try {
        const data = { /* tus datos actuales */ };

        console.log("Guardando localmente (Simulado)...");

async function generarApp(esModoE8) {
    modoE8Actual = esModoE8;
    console.log("Iniciando generación: " + (esModoE8 ? "Elige 8" : "Quiniela"));

    const matriz = [];
    const bs = [], ds = [];

    // 1. CAPTURA DE DATOS
    for (let i = 1; i <= 14; i++) {
        const checkE8 = document.getElementById(`e8_${i}`);
        if (esModoE8 && !(checkE8 && checkE8.checked)) continue;

        const inputPro = document.getElementById(`pro${i}`);
        const sigs = inputPro ? inputPro.value.toUpperCase().match(/[1X2]/g) : null;
        if (!sigs) continue;

        const c1 = parseFloat(document.getElementById(`c1_${i}`)?.value.replace(',', '.')) || 0;
        const cX = parseFloat(document.getElementById(`cX_${i}`)?.value.replace(',', '.')) || 0;
        const c2 = parseFloat(document.getElementById(`c2_${i}`)?.value.replace(',', '.')) || 0;
        const cuotas = [{s:'1', v:c1}, {s:'X', v:cX}, {s:'2', v:c2}].filter(o => o.v > 0);
        
        const minV = Math.min(...cuotas.map(o => o.v));
        const maxV = Math.max(...cuotas.map(o => o.v));

        bs.push(cuotas.find(o => o.v === minV)?.s || "1");
        ds.push(cuotas.find(o => o.v === maxV)?.s || "X");
        matriz.push({ id: i, s: sigs, c1, cX, c2, minV, maxV });
    }

    if (matriz.length === 0) return alert("Introduce pronósticos.");

    // 2. GENERACIÓN DEL UNIVERSO BASE
    let univ = [[]];
    for (let p of matriz) {
        let n = [];
        for (let c of univ) for (let s of p.s) n.push([...c, s]);
        univ = n;
    }

    // 3. CAPTURA DE FILTROS POR TRAMOS
    const getS = id => new Set(Array.from(document.getElementById(id)?.querySelectorAll('.active') || []).map(b => parseInt(b.innerText)));
    const f = esModoE8 ? { b:getS('btns-e8b'), d:getS('btns-e8d'), u:getS('btns-e8u') } : 
                         { u18:getS('btns-u-1'), u914:getS('btns-u-2'), b18:getS('btns-b-1'), b914:getS('btns-b-2'), d18:getS('btns-d-1'), d914:getS('btns-d-2') };

    let universoFiltrado = univ.filter(c => {
        let nU1=0, nU2=0, nB1=0, nB2=0, nD1=0, nD2=0, nU=0, nB=0, nD=0;
        c.forEach((s, idx) => {
            const m = matriz[idx];
            const cJ = (s==='1')? m.c1 : (s==='X'? m.cX : m.c2);
            const esU=s==='1', esB=Math.abs(cJ-m.minV)<0.01, esD=Math.abs(cJ-m.maxV)<0.01 && m.maxV>m.minV;
            if(esModoE8) { if(esU)nU++; if(esB)nB++; if(esD)nD++; }
            else {
                if(idx<8){ if(esU)nU1++; if(esB)nB1++; if(esD)nD1++; }
                else { if(esU)nU2++; if(esB)nB2++; if(esD)nD2++; }
            }
        });
        return esModoE8 ? ((f.u.size===0||f.u.has(nU))&&(f.b.size===0||f.b.has(nB))&&(f.d.size===0||f.d.has(nD))) :
                          ((f.u18.size===0||f.u18.has(nU1))&&(f.u914.size===0||f.u914.has(nU2))&&(f.b18.size===0||f.b18.has(nB1))&&(f.b914.size===0||f.b914.has(nB2))&&(f.d18.size===0||f.d18.has(nD1))&&(f.d914.size===0||f.d914.has(nD2)));
    });

    // 4. MOTOR DE REDUCCIÓN (SLIDER SOBRE COBERTURA)
    const objAciertos = parseInt(document.getElementById('selReduccion')?.value || 14);
    const porcentajeSlider = parseFloat(document.getElementById('rangePct')?.value || 100);

    if (objAciertos < 14) {
        let reduccionFinal = [];
        let pool = [...universoFiltrado];
        let cubiertas = new Uint8Array(universoFiltrado.length);
        let totalCubiertas = 0;
        const objetivoDeCobertura = Math.floor(universoFiltrado.length * (porcentajeSlider / 100));

        while (totalCubiertas < objetivoDeCobertura && pool.length > 0) {
            let mejorColIdx = -1, mejorAporte = -1;
            let numPruebas = Math.min(pool.length, 200); 

            for (let t = 0; t < numPruebas; t++) {
                let rIdx = Math.floor(Math.random() * pool.length);
                let candidata = pool[rIdx];
                let aporte = 0;
                for (let j = 0; j < universoFiltrado.length; j++) {
                    if (cubiertas[j] === 0) {
                        let ac = 0;
                        for (let k = 0; k < 14; k++) { if (candidata[k] === universoFiltrado[j][k]) ac++; }
                        if (ac >= objAciertos) aporte++;
                    }
                }
                if (aporte > mejorAporte) { mejorAporte = aporte; mejorColIdx = rIdx; }
                if (mejorAporte > (universoFiltrado.length / 50)) break; 
            }

            if (mejorColIdx === -1 || mejorAporte === 0) break;
            let elegida = pool.splice(mejorColIdx, 1)[0];
            reduccionFinal.push(elegida);
            for (let j = 0; j < universoFiltrado.length; j++) {
                if (cubiertas[j] === 0) {
                    let ac = 0;
                    for (let k = 0; k < 14; k++) { if (elegida[k] === universoFiltrado[j][k]) ac++; }
                    if (ac >= objAciertos) { cubiertas[j] = 1; totalCubiertas++; }
                }
            }
        }
        validas = reduccionFinal.map(col => col.map((s, idx) => ({ id: matriz[idx].id, s })));
    } else {
        validas = universoFiltrado.map(col => col.map((s, idx) => ({ id: matriz[idx].id, s })));
    }
 // 5. ACTUALIZAR UI
    const elFiltrado = document.getElementById('stFiltrado');
    if (elFiltrado) elFiltrado.innerText = validas.length;
    
    idx = 0;
    if (validas.length > 0) {
        pitar(); // Muestra la primera tarjeta
        
        if (typeof calcularGarantias === 'function') {
            calcularGarantias();
        }
        
        // Ejecutamos el escrutinio aquí dentro para que actúe sobre las nuevas validas
        if (typeof ejecutarEscrutinio === 'function') {
            ejecutarEscrutinio();
        }
    } else {
        // Si no hay columnas, limpiamos el panel de premios
        const listaPremios = document.getElementById('listaPremiosRealtime');
        if (listaPremios) listaPremios.innerHTML = "<div style='color:gray'>Sin columnas</div>";
        alert("0 columnas encontradas.");
    }
}

function calcularGarantias() {
    if (!validas || validas.length === 0) return ""; 

    // 1. CÁLCULO DINÁMICO DEL TOTAL (Sin valores fijos)
    let totalMatriz = 1;
    for (let i = 1; i <= 14; i++) {
        const inputPro = document.getElementById(`pro${i}`);
        const sigs = inputPro ? inputPro.value.toUpperCase().match(/[1X2]/g) : null;
        if (sigs) {
            totalMatriz *= sigs.length; // Multiplica por 2 si es doble, por 3 si es triple
        }
    }

    const nGen = validas.length; 

    if (totalMatriz <= 0) return "";

    // 2. CÁLCULOS DE GARANTÍA REALES
    // El 14 es el porcentaje de tus columnas sobre el total de la combinación
    let g14 = (nGen / totalMatriz) * 100;
    
    // Cobertura estimada: Una columna de 14 cubre 28 columnas de 13 (aprox)
    // Usamos logaritmos y potencias para una estimación más seria que multiplicadores fijos
    let g13 = Math.min(100, g14 * 18);  // Ajustado para realismo en quiniela
    let g12 = Math.min(100, g13 * 8);
    let g11 = Math.min(100, g12 * 4);
    let g10 = 100;

    // Si nGen es igual al total (apuesta directa), todo es 100%
    if (nGen >= totalMatriz) {
        g14 = 100; g13 = 100; g12 = 100; g11 = 100;
    }

    const f = (n) => {
        if (n >= 99.99) return "100%";
        if (n < 0.01) return "0.01%";
        return n.toFixed(1) + "%";
    };

    // 3. ACTUALIZAR PANEL VISUAL
    const ids = ['14', '13', '12', '11', '10'];
    const valores = [g14, g13, g12, g11, g10];

    ids.forEach((id, index) => {
        const el = document.getElementById(`g-${id}`);
        if(el) {
            el.innerText = f(valores[index]);
            // Cambio de color dinámico según probabilidad
            el.style.color = valores[index] > 50 ? '#4ade80' : (valores[index] > 10 ? '#fbbf24' : '#ef4444');
        }
    });

    return ""; 
}

    // 1. Capturar filtros (Bases: 4,5,6 | Difíciles: 0,1,2)
    const fB = Array.from(document.querySelectorAll('#btns-e8b .btn-f.active')).map(b => parseInt(b.innerText));
    const fD = Array.from(document.querySelectorAll('#btns-e8d .btn-f.active')).map(b => parseInt(b.innerText));

    const idsE8 = [4, 8, 9, 10, 11, 12, 13, 14];
    const infoP = {};
    const matriz = [];

    // 2. Leer datos de la tabla
    idsE8.forEach(id => {
        const pV = document.getElementById(`pro${id}`)?.value.toUpperCase() || "";
        const sigs = pV.match(/[1X2]/g);
        if (!sigs) return;

        const c1 = parseFloat(document.getElementById(`c1_${id}`)?.value) || 0;
        const cX = parseFloat(document.getElementById(`cX_${id}`)?.value) || 0;
        const c2 = parseFloat(document.getElementById(`c2_${id}`)?.value) || 0;
        const cuotas = [c1, cX, c2].filter(v => v > 0);

        infoP[id] = { min: Math.min(...cuotas), max: Math.max(...cuotas), c1, cX, c2 };
        matriz.push({ id, s: sigs });
    });

    if (matriz.length < 8) return alert("Error: Faltan datos en los 8 partidos del Elige 8");

    // 3. Generar combinaciones (243)
    const gen = (a) => a.reduce((x, y) => x.flatMap(d => y.s.map(s => [...d, { id: y.id, s }])), [[]]);
    const todas = gen(matriz);

    // 4. Filtrar
    const filtradas = todas.filter(fila => {
        let nB = 0, nD = 0;
        fila.forEach(p => {
            const inf = infoP[p.id];
            const cJ = (p.s === '1') ? inf.c1 : (p.s === 'X' ? inf.cX : inf.c2);
            if (cJ === inf.min) nB++;
            else if (cJ === inf.max) nD++;
        });
        return (fB.length === 0 || fB.includes(nB)) && (fD.length === 0 || fD.includes(nD));
    });

    // 5. Crear el archivo TXT
    let contenido = `APUESTAS ELIGE 8 GENERADAS\n`;
    contenido += `Total encontradas: ${filtradas.length}\n`;
    contenido += `Filtros: Bases(${fB}) - Difíciles(${fD})\n`;
    contenido += `------------------------------------\n`;

    filtradas.forEach((fila, i) => {
        const linea = fila.map(p => p.s).join(" | ");
        contenido += `Apuesta ${i + 1}: ${linea}\n`;
    });

    const blob = new Blob([contenido], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `apuestas_e8_${filtradas.length}.txt`;
    link.click();
}

function cargarProyectoCompleto(event) {
    const input = event.target;
    if (!input || !input.files || input.files.length === 0) return;
    
    const lector = new FileReader();
    lector.onload = function(e) {
        try {
            const proyecto = JSON.parse(e.target.result);
            if (!proyecto || !proyecto.partidos) throw new Error("Formato no reconocido");

            // --- PASO 1: FORZAR EL DIBUJO DE LA TABLA ---
            // Si la tabla no está dibujada, la creamos vacía para poder meter los datos del JSON
            if (document.getElementById('cuerpoTabla').innerHTML === "") {
                console.log("Dibujando tabla vacía para recibir datos...");
                poblarTabla(proyecto.partidos); 
            }

            // --- PASO 2: FUNCIÓN DE ASIGNACIÓN SEGURA ---
            const safeSet = (id, valor) => {
                const el = document.getElementById(id);
                if (el && valor !== undefined && valor !== null) {
                    // Si es un checkbox (Elige 8)
                    if (el.type === 'checkbox') el.checked = !!valor;
                    // Si es un input o select normal
                    else el.value = valor;
                    return true;
                }
                return false;
            };

            // --- PASO 3: RELLENAR DATOS ---
            proyecto.partidos.forEach((p) => {
                const n = p.id;
                safeSet(`L${n}`, p.local);
                safeSet(`V${n}`, p.visitante);
                safeSet(`c1_${n}`, p.c1);
                safeSet(`cX_${n}`, p.cx);
                safeSet(`c2_${n}`, p.c2);
                safeSet(`R${n}`, p.real);
                
                if (n === 15) {
                    if (p.pro && typeof p.pro === 'string' && p.pro.includes('-')) {
                        const partes = p.pro.split('-');
                        safeSet('p15L', partes[0]);
                        safeSet('p15V', partes[1]);
                    }
                } else {
                    safeSet(`pro${n}`, p.pro);
                    // Elige 8
                    const chk = document.getElementById(`e8_${n}`);
                    if (chk) chk.checked = !!p.e8;
                }
                
                if (typeof analizar === 'function' && n <= 14) analizar(n);
            });

            // 4. RESTAURAR FILTROS (Botones azules)
            if (proyecto.filtros) {
                document.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));
                Object.keys(proyecto.filtros).forEach(clave => {
                    const idCont = `btns-${clave.charAt(0)}-${clave.slice(1)}`;
                    const contenedor = document.getElementById(idCont);
                    if (contenedor) {
                        proyecto.filtros[clave].forEach(num => {
                            const btn = Array.from(contenedor.querySelectorAll('.btn-f')).find(b => b.innerText == num);
                            if (btn) btn.classList.add('active');
                        });
                    }
                });
            }

            // 5. CONFIGURACIÓN Y APUESTAS
            if (proyecto.configuracion) {
                safeSet('rangePct', proyecto.configuracion.porcentaje);
                const visor = document.getElementById('valPct');
                if (visor) visor.innerText = (proyecto.configuracion.porcentaje || 0) + "%";
                safeSet('selReduccion', proyecto.configuracion.reduccion);
            }

            if (proyecto.apuestas_actuales) {
                validas = proyecto.apuestas_actuales;
                document.getElementById('stFiltrado').innerText = validas.length;
                document.getElementById('zona-nav').style.display = 'block';
                idx = 0;
                setTimeout(() => { if(typeof pitar === 'function') pitar(); }, 300);
            }

            alert("✅ Proyecto cargado completo.");

        } catch (err) {
            console.error(err);
            alert("❌ Error: " + err.message);
        } finally {
            input.value = "";
        }
    };
    lector.readAsText(input.files[0]);
}

if (window.innerWidth < 768) {
    // Hacer que las cajas de filtros se puedan abrir/cerrar al tocar el título
    document.querySelectorAll('.filtro-card h3').forEach(titulo => {
        titulo.style.cursor = "pointer";
        titulo.innerHTML += " <small>(tocar para ver)</small>";
        
        // Empezar cerrados en móvil para ahorrar espacio
        const contenido = titulo.parentElement.querySelectorAll('.grupo-f');
        contenido.forEach(c => c.style.display = 'none');

        titulo.onclick = function() {
            contenido.forEach(c => {
                c.style.display = (c.style.display === 'none') ? 'block' : 'none';
            });
        };
    });

}
