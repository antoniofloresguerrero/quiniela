}
/* Si quieres que los botones ocupen el mismo ancho */
.btn-main {

<script>
function descargarRellenas() {
    if (!apuestasGlobal.length) return alert("No hay apuestas para descargar.");
    
    // Obtenemos los signos Base de cada fila una sola vez
    const basesFila = [];
    for (let i = 1; i <= 14; i++) {
        let q1 = parseFloat(document.getElementById(`q1_${i}`).value) || 0,
            qX = parseFloat(document.getElementById(`qX_${i}`).value) || 0,
            q2 = parseFloat(document.getElementById(`q2_${i}`).value) || 0;
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        basesFila.push(qs[0].s); // El primero es el Base (cuota menor)
    }

    // Generamos el contenido del TXT
    let contenido = apuestasGlobal.map(apuesta => {
        let signos = apuesta.s.split('');
        let rellena = signos.map((s, idx) => {
            return s === "_" ? basesFila[idx] : s;
        });
        return rellena.join('');
    }).join('\n');

    // Descarga del archivo
    let blob = new Blob([contenido], { type: 'text/plain' });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "quiniela_rellena.txt";
    a.click();
}

// Modificamos el render para que los huecos rellenos se vean de otro color (ej. Gris o Azul claro)
function render() {
    const basesFila = [];
    for (let i = 1; i <= 14; i++) {
        let q1 = parseFloat(document.getElementById(`q1_${i}`).value) || 0,
            qX = parseFloat(document.getElementById(`qX_${i}`).value) || 0,
            q2 = parseFloat(document.getElementById(`q2_${i}`).value) || 0;
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        basesFila.push(qs[0].s);
    }

    let max = apuestasGlobal.length ? Math.max(...apuestasGlobal.map(a => a.ac)) : 0;
    
    document.getElementById('listadoApuestas').innerHTML = apuestasGlobal.map((a, i) => {
        let signsHTML = a.s.split('').map((s, idx) => {
            if (s === "_") {
                // Signo base en otro color para el hueco
                return `<span style="color: #718096; opacity: 0.6;">${basesFila[idx]}</span>`;
            }
            return `<span>${s}</span>`;
        }).join(' ');

        return `<div class="linea ${a.ac > 0 && a.ac === max ? 'ganadora' : ''}">
            <span>[${i+1}] ${signsHTML}</span>
            <span style="color:#63b3ed; font-weight:bold;">${a.ac} ac.</span>
        </div>`;
    }).join('');
}


// --- 1. CONFIGURACIÓN Y VARIABLES GLOBALES ---
let apuestasGlobal = []; 
let indicesE8 = [];
const filtros = { unos: new Set(), bases: new Set(), dificiles: new Set() };

// --- 2. GENERACIÓN DINÁMICA DE LA INTERFAZ ---
function crearBotones() {
    // Estos nombres deben coincidir con los de tu objeto 'filtros'
    const secciones = ['Unos', 'Bases', 'Dificiles'];
    
    secciones.forEach(sec => {
        // Buscamos exactamente los IDs de tu HTML: gridUnos1, gridUnos2...
        const bloque1 = document.getElementById('grid' + sec + '1');
        const bloque2 = document.getElementById('grid' + sec + '2');

        if (bloque1 && bloque2) {
            bloque1.innerHTML = '';
            bloque2.innerHTML = '';

            // Fila 1: del 0 al 8
            for (let i = 0; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-num';
                btn.id = `btn${sec.toLowerCase()}${i}`; // ID para CSS y lógica: btnunos0, btnbases1...
                btn.innerText = i;
                btn.onclick = () => toggleFiltro(sec, i);
                bloque1.appendChild(btn);
            }
            // Fila 2: del 9 al 14
            for (let i = 9; i <= 14; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-num';
                btn.id = `btn${sec.toLowerCase()}${i}`;
                btn.innerText = i;
                btn.onclick = () => toggleFiltro(sec, i);
                bloque2.appendChild(btn);
            }
        }
    });
}

// Dibujar tabla de pronósticos
const body = document.getElementById('tablaBody');
if(body) {
    body.innerHTML = '';
    for(let i=1; i<=14; i++) {
        body.innerHTML += `<tr><td>${i}</td><td><input type="text" id="p${i}" value="1X2"></td><td><input type="checkbox" id="chk${i}" ${i<=8?'checked':''}></td><td><input type="number" step="0.1" id="q1_${i}" value="1.8" oninput="actualizarBD()"></td><td><input type="number" step="0.1" id="qX_${i}" value="3.2" oninput="actualizarBD()"></td><td><input type="number" step="0.1" id="q2_${i}" value="4.5" oninput="actualizarBD()"></td><td id="inf${i}">-</td><td><input type="text" id="res${i}" style="width:36px; background:#2d3748; border:none; color:white;"></td></tr>`;
    }
}

// --- 3. LÓGICA DE FILTROS ---
function toggleFiltro(tipo, num) {
    const key = tipo.toLowerCase();
    const btn = document.getElementById(`btn${key}${num}`);
    if (filtros[key].has(num)) {
        filtros[key].delete(num);
        if(btn) btn.classList.remove('active');
    } else {
        filtros[key].add(num);
        if(btn) btn.classList.add('active');
    }
}

function actualizarBD() {
    let sel = []; 
    indicesE8 = [];
    
    // 1. Nuevas variables para contar
    let triples = 0;
    let dobles = 0;

    for(let i=1; i<=14; i++) {
        let q1 = parseFloat(document.getElementById(`q1_${i}`).value)||0,
            qX = parseFloat(document.getElementById(`qX_${i}`).value)||0,
            q2 = parseFloat(document.getElementById(`q2_${i}`).value)||0;
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        const info = document.getElementById(`inf${i}`);
        if(info) info.innerText = `B:${qs[0].s}|D:${qs[2].s}`;
        
        if(document.getElementById(`chk${i}`).checked) {
            // 2. Leemos el valor del pronóstico para contar
            let pronoTexto = document.getElementById(`p${i}`).value.toUpperCase();
            if(pronoTexto.length === 3) triples++;
            else if(pronoTexto.length === 2) dobles++;

            sel.push({ p: pronoTexto.split(''), b: qs[0].s, d: qs[2].s });
            indicesE8.push(i);
        }
    }

    // 3. Actualizamos el ID "outJuego" en la barra superior
    const outJuego = document.getElementById('outJuego');
    if(outJuego) outJuego.innerText = `${triples}T, ${dobles}D`;

    return sel;
}


// --- 4. MOTOR ---
function generar() {
    const sel = actualizarBD(); 
    const target = parseInt(document.getElementById('fPct').value) / 100; 
    const nH = parseInt(document.getElementById('selHuecos').value);
    let uni = [];

    // 1. Generar combinaciones base (Filtrado)
    function gen(idx, comb, u, b, d) {
        if (idx === sel.length) {
            if ((filtros.unos.size === 0 || filtros.unos.has(u)) &&
                (filtros.bases.size === 0 || filtros.bases.has(b)) &&
                (filtros.dificiles.size === 0 || filtros.dificiles.has(d))) {
                uni.push(comb.join(''));
            }
            return;
        }
        sel[idx].p.forEach(s => gen(idx + 1, [...comb, s], u + (s === '1' ? 1 : 0), b + (s === sel[idx].b ? 1 : 0), d + (s === sel[idx].d ? 1 : 0)));
    }

    gen(0, [], 0, 0, 0);
    if (!uni.length) return alert("Filtro sin resultados.");
    document.getElementById('outF').innerText = uni.length;

    let noCub = new Set(uni); 
    apuestasGlobal = [];
    
    // 2. Pre-calcular posiciones de huecos
    const hCombos = []; 
    function cber(s, a) { 
        if (a.length === nH) { hCombos.push([...a]); return; } 
        for (let i = s; i < sel.length; i++) cber(i + 1, [...a, i]); 
    }
    cber(0, []);

    // 3. Reducción Optimizada para no colgar el PC
    const iterarReduccion = () => {
        if (noCub.size > uni.length * (1 - target) && apuestasGlobal.length < 1200) {
            let mejorA = "", mejorHS = null, maxC = -1;
            
            // Limitamos la búsqueda a una muestra para ganar velocidad
            let pool = Array.from(noCub).slice(0, 50); 
            let muestraH = hCombos.length > 100 ? 100 : hCombos.length;

            for (let bStr of pool) {
                for (let i = 0; i < muestraH; i++) {
                    // Si hay muchas posiciones, cogemos una al azar; si hay pocas, las recorremos
                    let hs = hCombos.length > 100 ? hCombos[Math.floor(Math.random() * hCombos.length)] : hCombos[i];
                    
                    let cur = [];
                    function chk(hI, cb) {
                        if (hI === nH) { 
                            let s = cb.join(''); 
                            if (noCub.has(s)) cur.push(s); 
                            return; 
                        }
                        ['1', 'X', '2'].forEach(sig => { 
                            let ncb = [...cb]; ncb[hs[hI]] = sig; 
                            chk(hI + 1, ncb); 
                        });
                    }
                    chk(0, bStr.split(''));

                    if (cur.length > maxC) {
                        maxC = cur.length; mejorA = bStr; mejorHS = hs; 
                        var mejoresC = cur;
                    }
                    if (maxC >= Math.pow(3, nH)) break;
                }
            }

            if (maxC > 0) {
                mejoresC.forEach(s => noCub.delete(s));
                let v = mejorA.split(''); 
                mejorHS.forEach(idx => v[idx] = "_");
                apuestasGlobal.push({ s: v.join(''), ac: 0 });
                
                // Actualizar interfaz cada 5 apuestas para no bloquear
                if(apuestasGlobal.length % 5 === 0) {
                    document.getElementById('outR').innerText = apuestasGlobal.length;
                    document.getElementById('outC').innerText = (apuestasGlobal.length * 0.75).toFixed(2) + "€";
                }
                
                // Usar setTimeout para dejar que el navegador respire
                setTimeout(iterarReduccion, 0);
            } else {
                finalizar();
            }
        } else {
            finalizar();
        }
    };

    const finalizar = () => {
        document.getElementById('outR').innerText = apuestasGlobal.length;
        document.getElementById('outC').innerText = (apuestasGlobal.length * 0.75).toFixed(2) + "€";
        render();
        alert("Generación completada.");
    };

    iterarReduccion();
}


function render() {
    let max = apuestasGlobal.length?Math.max(...apuestasGlobal.map(a=>a.ac)):0;
    document.getElementById('listadoApuestas').innerHTML = apuestasGlobal.map((a, i) => `<div class="linea ${a.ac>0&&a.ac===max?'ganadora':''}"><span>[${i+1}] ${a.s.split('').join(' ')}</span><span style="color:#63b3ed; font-weight:bold;">${a.ac} ac.</span></div>`).join('');
}

function escrutar() {
    if(!apuestasGlobal.length) return;
    let rU=0, rB=0, rD=0;
    let real = indicesE8.map(idx => {
        let v = (document.getElementById(`res${idx}`).value || "").toUpperCase();
        if(v === '1') rU++;
        let q1=parseFloat(document.getElementById(`q1_${idx}`).value), qX=parseFloat(document.getElementById(`qX_${idx}`).value), q2=parseFloat(document.getElementById(`q2_${idx}`).value);
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        if(v === qs[0].s) rB++; if(v === qs[2].s) rD++; return v;
    });
    if(real.includes("")) return alert("Pon resultados REAL.");
    document.getElementById('rUnos').innerText = rU; document.getElementById('rBases').innerText = rB; document.getElementById('rDificiles').innerText = rD;
    apuestasGlobal.forEach(a => {
        let c = 0, s = a.s.split('');
        for(let j=0; j<s.length; j++) if(s[j] !== "_" && s[j] === real[j]) c++;
        a.ac = c;
    });
    apuestasGlobal.sort((a,b) => b.ac - a.ac);
    document.getElementById('outMax').innerText = apuestasGlobal[0].ac;
    render();
}

function guardar() {
    let d = { f: { u:[...filtros.unos], b:[...filtros.bases], d:[...filtros.dificiles], p:document.getElementById('fPct').value }, c: [] };
    for(let i=1; i<=14; i++) {
        let p = document.getElementById(`p${i}`), q1 = document.getElementById(`q1_${i}`), qX = document.getElementById(`qX_${i}`), q2 = document.getElementById(`q2_${i}`), r = document.getElementById(`res${i}`), ch = document.getElementById(`chk${i}`);
        d.c.push({ p: p?p.value:'', q1: q1?q1.value:'', qX: qX?qX.value:'', q2: q2?q2.value:'', r: r?r.value:'', chk: ch?ch.checked:false });
    }
    let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:"application/json"})); a.download="elige8.json"; a.click();
}

function abrir(ev) {
    if(!ev.target.files.length) return;
    let reader = new FileReader();
    reader.onload = (e) => {
        let d = JSON.parse(e.target.result); let f = d.f || {};
        filtros.unos = new Set(f.u || []); filtros.bases = new Set(f.b || []); filtros.dificiles = new Set(f.d || []);
        document.getElementById('fPct').value = f.p || 100; document.getElementById('pctVal').innerText = (f.p || 100) + "%";
        
        crearBotones(); 
        ['unos', 'bases', 'dificiles'].forEach(tipo => {
            filtros[tipo].forEach(num => {
                const btn = document.getElementById(`btn${tipo}${num}`);
                if(btn) btn.classList.add('active');
            });
        });

        (d.c || []).forEach((c, i) => { 
            let idx = i+1; 
            if(document.getElementById(`p${idx}`)) document.getElementById(`p${idx}`).value = c.p || "1X2";
            if(document.getElementById(`q1_${idx}`)) document.getElementById(`q1_${idx}`).value = c.q1 || "1.8";
            if(document.getElementById(`qX_${idx}`)) document.getElementById(`qX_${idx}`).value = c.qX || "3.2";
            if(document.getElementById(`q2_${idx}`)) document.getElementById(`q2_${idx}`).value = c.q2 || "4.5";
            if(document.getElementById(`res${idx}`)) document.getElementById(`res${idx}`).value = c.r || "";
            if(document.getElementById(`chk${idx}`)) document.getElementById(`chk${idx}`).checked = c.chk || false;
        });
        actualizarBD();
    };
    reader.readAsText(ev.target.files[0]);
}

// Lanzamiento inicial
window.onload = () => {
    crearBotones();
    actualizarBD();
};

function descargarTxtHuecos() {
    // 1. Verificar si hay apuestas generadas
    if (!apuestasGlobal || apuestasGlobal.length === 0) {
        return alert("Primero debes pulsar GENERAR para crear las apuestas.");
    }

    try {
        // 2. Unir las apuestas. Usamos ap.s que es donde está la cadena con "_"
        // Nota: .split('').join(' ') añade un espacio entre signos para que sea legible
        const contenido = apuestasGlobal.map(ap => {
            if (ap && ap.s) {
                return ap.s.split('').join(' ');
            }
            return "";
        }).filter(linea => linea !== "").join('\n');

        // 3. Crear el archivo para descargar
        const blob = new Blob([contenido], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        // 4. CORRECCIÓN DEL ERROR: Intentar leer jornada, si no existe usar "X"
        const jornadaInput = document.getElementById('jornada');
        const numJornada = jornadaInput ? jornadaInput.value : "X";
        
        a.href = url;
        a.download = `quiniela_elige8_J${numJornada}_reducida.txt`;
        
        // 5. Ejecutar descarga
        document.body.appendChild(a);
        a.click();
        
        // 6. Limpiar memoria
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
        
    } catch (err) {
        console.error("Error en la descarga:", err);
        alert("Ocurrió un error al generar el archivo TXT.");
    }
}
