<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Elige8 PRO - Jornada 58</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 10px; margin: 0; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 900px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* BOTONES DE ARCHIVO */
        .header-actions { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-file { flex: 1; padding: 10px; background: transparent; border: 1px solid #38bdf8; color: #38bdf8; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8em; text-align: center; }
        .btn-file:hover { background: #38bdf8; color: #0f172a; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-bottom: 15px; table-layout: fixed; }
        th { background: #334155; color: #94a3b8; padding: 8px; text-transform: uppercase; }
        td { padding: 6px; border-bottom: 1px solid #334155; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Ajuste para 6 columnas */
th:nth-child(1), td:nth-child(1) { width: 35%; text-align: left; padding-left: 10px; } 
th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4) { width: 12%; }
th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6) { width: 9%; }

        input[type="number"] { background: #0f172a; color: #fbbf24; border: 1px solid #3b82f6; padding: 4px; border-radius: 4px; width: 100%; max-width: 60px; text-align: center; }

        .filtros { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .filtros label { display: block; font-size: 0.7em; color: #38bdf8; font-weight: bold; margin-bottom: 4px; }

        .resumen-premios { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin-bottom: 15px; }
        .card-premio { background: #0f172a; padding: 8px 2px; border-radius: 6px; text-align: center; border-bottom: 3px solid #334155; font-size: 0.7em; }
        .card-premio b { font-size: 1.2em; color: #4ade80; }
        .has-8 { border-bottom-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }

        .input-real { width: 100%; padding: 12px; background: #1e3a8a; color: white; border: none; border-radius: 8px; text-align: center; letter-spacing: 12px; font-family: monospace; font-size: 1.3em; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #38bdf8; color: #0f172a; margin-bottom: 5px; }

        #betCard { background-color: #0b111b; border-radius: 12px; padding: 20px; color: #ffffff; max-width: 380px; margin: auto; border: 1px solid #1e293b; }
        .paginador-info { color: #d93025; text-align: center; margin-bottom: 5px; font-weight: bold; }
        .controles-pago { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .controles-pago button { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

        .match-row { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #1e293b; font-size: 13px; align-items: center; }
        .match-row.es-elige8 { background-color: #1e2d4a !important; }
        .hit { color: #4ade80 !important; font-weight: bold; }
        .footer-aciertos { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <!-- AQUÍ ESTÁN LOS BOTONES -->
    <div class="header-actions">
        <label class="btn-file">📂 ABRIR JSON <input type="file" id="inputAbrir" style="display:none" accept=".json" onchange="abrirArchivo(event)"></label>
        <button class="btn-file" onclick="guardarArchivo()">💾 GUARDAR JSON</button>
    </div>

    <table>
        <thead><tr><th>Equipos</th><th>C1</th><th>CX</th><th>C2</th><th>Base</th><th>Difícil</th></tr></thead>
        <tbody id="cuerpoCuotas"></tbody>
    </table>

    <div class="filtros">
        <div><label>BASES</label><input type="number" id="minB" value="3"> - <input type="number" id="maxB" value="8"></div>
        <div><label>DIFÍCILES</label><input type="number" id="minD" value="0"> - <input type="number" id="maxD" value="4"></div>
        <div><label>UNOS</label><input type="number" id="min1" value="2"> - <input type="number" id="max1" value="7"></div>
    </div>

    <button class="btn-main" onclick="calcular()">GENERAR Y FILTRAR</button>
    <button class="btn-main" style="background:#4ade80" onclick="descargarArchivo()">📥 DESCARGAR TXT (PLENO MM)</button>

    <input type="text" id="resultadoReal" class="input-real" placeholder="21XX1121" maxlength="8" oninput="escrutar()">
    
    <div id="resumenPremios" class="resumen-premios"></div>
    <div id="betCard"></div>
</div>

<script>
const matriz27 = ["11111","11X2X","112X2","1X122","1XX1X","1X2XX","121XX","12X12","12221","X11XX","X1X12","X1221","XX111","XXX2X","XX2X2","X212X","X2X22","X221X","21122","21X1X","212XX","2X1XX","2XX12","2X221","22111","22X2X","222X2"];
const partidosElige = [1, 2, 3, 4, 5, 6, 7, 12];
const equipos = ["ATH.CLUB - OSASUNA", "BARCELONA - CELTA", "LEVANTE - SEVILLA", "MALLORCA - VALENCIA", "R.OVIEDO - VILLARREAL", "R.MADRID - ALAVÉS", "ELCHE - AT.MADRID", "RAYO - ESPANYOL", "R.SOCIEDAD - GETAFE", "COVENTRY - PORTSMOUTH", "Q.P.R. - SWANSEA", "SOUTHAMPTON - BRISTOL C.", "CHARLTON - IPSWICH", "LEICESTER - HULL"];

let pInfo = {}; 
let apuestasFinales = [];
let indiceActual = 0;

function init() {
    const tbody = document.getElementById('cuerpoCuotas');
    if (!tbody) return;
    tbody.innerHTML = "";

    partidosElige.forEach(p => {
        const nombre = equipos[p - 1] || "Partido " + p;
        tbody.innerHTML += `<tr>
            <td style="text-align:left; padding-left:10px;">
                <b style="color:#38bdf8">${p}.</b> ${nombre}
            </td>
            <td><input type="number" step="0.01" value="1.80" id="c1_${p}" onchange="analizar(${p})"></td>
            <td><input type="number" step="0.01" value="3.40" id="cX_${p}" onchange="analizar(${p})"></td>
            <td><input type="number" step="0.01" value="4.20" id="c2_${p}" onchange="analizar(${p})"></td>
            <td id="det-${p}" style="font-weight:bold;color:#fbbf24"></td>
            <td id="diff-${p}" style="font-weight:bold;color:#f87171"></td> <!-- Celda Difícil -->
        </tr>`;
        analizar(p);
    });
}

function analizar(p) {
    const v1 = parseFloat(document.getElementById(`c1_${p}`).value) || 0;
    const vX = parseFloat(document.getElementById(`cX_${p}`).value) || 0;
    const v2 = parseFloat(document.getElementById(`c2_${p}`).value) || 0;
    
    // Ordenamos de menor a mayor cuota
    const vals = [
        { s: "1", v: v1 }, 
        { s: "X", v: vX }, 
        { s: "2", v: v2 }
    ].sort((a, b) => a.v - b.v);

    // Guardamos en pInfo: Base (la cuota más baja) y Diff (la cuota más alta)
    pInfo[p] = { 
        base: vals[0].s, 
        diff: vals[2].s 
    };

    // Pintamos en la tabla
    document.getElementById(`det-${p}`).innerText = vals[0].s;  // Base
    document.getElementById(`diff-${p}`).innerText = vals[2].s; // Difícil
}


function calcular() {
    const minB = parseInt(document.getElementById('minB').value);
    const maxB = parseInt(document.getElementById('maxB').value);
    const minD = parseInt(document.getElementById('minD').value);
    const maxD = parseInt(document.getElementById('maxD').value);
    const min1 = parseInt(document.getElementById('min1').value);
    const max1 = parseInt(document.getElementById('max1').value);
    
    apuestasFinales = [];
    // Partidos que son Triples en la matriz (1, 3, 4, 5, 7)
    const tP = [1, 3, 4, 5, 7]; 
    // Partidos que son Fijos (se toma la BASE de la tabla)
    const fP = [2, 6, 12];

    matriz27.forEach(fila => {
        const signosM = fila.split('');
        let dict = {};
        
        // 1. Asignamos signos de la matriz a los triples
        tP.forEach((p, k) => dict[p] = signosM[k]);
        // 2. Asignamos la BASE a los fijos
        fP.forEach(p => dict[p] = pInfo[p].base);

        // 3. CONTADORES PARA FILTRAR
        let nB = 0, nD = 0, n1 = 0;
        
        partidosElige.forEach(p => {
            const signoApuesta = dict[p];
            
            // Contar BASES (si el signo coincide con el favorito de la tabla)
            if(signoApuesta === pInfo[p].base) nB++;
            // Contar DIFÍCILES (si el signo coincide con la cuota más alta)
            if(signoApuesta === pInfo[p].diff) nD++;
            // Contar UNOS
            if(signoApuesta === "1") n1++;
        });

        // 4. APLICAR FILTROS (Solo entra si cumple los 3 rangos)
        if(nB >= minB && nB <= maxB && nD >= minD && nD <= maxD && n1 >= min1 && n1 <= max1) {
            apuestasFinales.push({...dict});
        }
    });

    indiceActual = 0;
    escrutar(); 
    
    if(apuestasFinales.length === 0) {
        alert("Ninguna apuesta cumple los filtros. Prueba a ampliar los rangos.");
    } else {
        alert("Filtrado completado: " + apuestasFinales.length + " apuestas generadas.");
    }
}


function escrutar() {
    const real = document.getElementById('resultadoReal').value.toUpperCase().replace(/\s+/g, '');
    const conteo = {8:0, 7:0, 6:0, 5:0, 4:0, 3:0, 2:0, 1:0, 0:0};
    if(real.length === 8) {
        apuestasFinales.forEach(ap => {
            let ac = 0;
            partidosElige.forEach((p, i) => { if(ap[p] === real[i]) ac++; });
            conteo[ac]++;
        });
    }
    let h = "";
    for(let i=8; i>=0; i--) h += `<div class="card-premio ${i>=7 && conteo[i]>0?'has-8':''}"><span>${i} AC.</span><br><b>${conteo[i]}</b></div>`;
    document.getElementById('resumenPremios').innerHTML = h;
    renderizarTarjeta(real);
}

function renderizarTarjeta(real) {
    const cont = document.getElementById('betCard');
    if (apuestasFinales.length === 0) { cont.innerHTML = "<center>Pulsa Generar</center>"; return; }
    const ap = apuestasFinales[indiceActual];
    let acE8 = 0;
    let h = `<div class="paginador-info">Columna ${indiceActual + 1} / ${apuestasFinales.length}</div>
             <div class="controles-pago"><button onclick="cambiarPagina(-1)">ANT</button><button onclick="cambiarPagina(1)">SIG</button></div>
             <div class="filas-container">`;
    for (let i = 0; i < 14; i++) {
        const n = i + 1;
        const esE8 = partidosElige.includes(n);
        const signo = ap[n] || "1";
        let hit = "";
        if (esE8 && real.length === 8) {
            if (signo === real[partidosElige.indexOf(n)]) { acE8++; hit = "hit"; }
        }
        h += `<div class="match-row ${esE8?'es-elige8':''} ${hit}"><span><b class="num">${n}.</b> ${equipos[i]}</span><b class="signo">${signo}</b></div>`;
    }
    h += `</div><div class="footer-aciertos" style="display: flex; justify-content: center; text-align: center; width: 100%;"><div><span>E8 AC.</span><br><b class="count-val" style="color:#4ade80">${acE8}</b></div></div>`;

    cont.innerHTML = h;
}

function cambiarPagina(n) {
    indiceActual = Math.max(0, Math.min(apuestasFinales.length - 1, indiceActual + n));
    escrutar();
}

function guardarArchivo() {
    const config = { cuotas: {}, filtros: { minB: document.getElementById('minB').value, maxB: document.getElementById('maxB').value, minD: document.getElementById('minD').value, maxD: document.getElementById('maxD').value, min1: document.getElementById('min1').value, max1: document.getElementById('max1').value }, real: document.getElementById('resultadoReal').value, apuestas: apuestasFinales };
    partidosElige.forEach(p => { config.cuotas[p] = [document.getElementById(`c1_${p}`).value, document.getElementById(`cX_${p}`).value, document.getElementById(`c2_${p}`).value]; });
    const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `quiniela_config.json`; a.click();
}

function abrirArchivo(event) {
    // CORRECCIÓN: Accedemos al primer archivo de la lista
    const archivo = event.target.files[0];
    
    // Si no hay archivo (ej: se cancela el diálogo), no hacemos nada
    if (!archivo) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const d = JSON.parse(e.target.result);
            
            // Cargar Filtros
            if (d.filtros) { 
                document.getElementById('minB').value = d.filtros.minB; 
                document.getElementById('maxB').value = d.filtros.maxB; 
                document.getElementById('minD').value = d.filtros.minD; 
                document.getElementById('maxD').value = d.filtros.maxD; 
                document.getElementById('min1').value = d.filtros.min1; 
                document.getElementById('max1').value = d.filtros.max1; 
            }
            
            // Cargar Cuotas
            if (d.cuotas) { 
                Object.keys(d.cuotas).forEach(p => { 
                    if(document.getElementById(`c1_${p}`)) {
                        document.getElementById(`c1_${p}`).value = d.cuotas[p][0]; 
                        document.getElementById(`cX_${p}`).value = d.cuotas[p][1]; 
                        document.getElementById(`c2_${p}`).value = d.cuotas[p][2]; 
                        analizar(p); 
                    }
                }); 
            }
            
            document.getElementById('resultadoReal').value = d.real || ""; 
            apuestasFinales = d.apuestas || []; 
            indiceActual = 0;
            escrutar();
            
        } catch (err) {
            alert("Error: El archivo no es un JSON válido o está corrupto.");
        }
    };
    
    // Ahora el parámetro 1 sí es un objeto tipo Blob/File
    reader.readAsText(archivo);
}

function descargarArchivo() {
    const txt = apuestasFinales.map(ap => { let l = Array(14).fill("1"); partidosElige.forEach(p => l[p-1] = ap[p]); return l.join('') + "MM"; }).join('\n');
    const blob = new Blob([txt], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "apuestas.txt"; a.click();
}

window.onload = init;
</script>
</body>
</html>
