<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Final Elige 8 - 5T+1D</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f4f8; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .inputs { display: flex; gap: 20px; margin-bottom: 25px; justify-content: center; }
        .input-group { background: #eef2f7; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #d1d9e6; }
        input { width: 50px; padding: 8px; text-align: center; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-gen { background: #27ae60; color: white; }
        .btn-txt { background: #2980b9; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #stats { background: #2c3e50; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        #log { background: #1e272e; color: #0be881; padding: 20px; border-radius: 8px; font-family: 'Courier New', monospace; height: 400px; overflow-y: scroll; white-space: pre; border: 2px solid #333; }
        .prob { color: #f1c40f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Generador de 5 Triples + 1 Doble (Condicionado)</h2>
        <p>Define tus rangos de **Bases (1)** y **Difíciles (2)**:</p>
        
        <div class="inputs">
            <div class="input-group">
                <label>BASES (Signo 1): </label><br>
                De <input type="number" id="bMin" value="2"> a <input type="number" id="bMax" value="4">
            </div>
            <div class="input-group">
                <label>DIFÍCILES (Signo 2): </label><br>
                De <input type="number" id="dMin" value="0"> a <input type="number" id="dMax" value="2">
            </div>
        </div>

        <div class="actions">
            <button class="btn-gen" onclick="ejecutarTodo()">1. Calcular y Mostrar Apuestas</button>
            <button class="btn-txt" onclick="descargar()">2. Descargar .TXT</button>
        </div>

        <div id="stats" style="display:none;"></div>
        <div id="log">Introduce los valores y pulsa "Calcular"...</div>
    </div>

    <script>
        // La reducción base de 27 apuestas (5 triples)
        const base27 = ["11111","1XXXX","12222","X1X22","XXXX1","X211X","212X2","2X121","22X1X","1X12X","12X11","112X2","XX112","X2X21","X121X","221X1","21X2X","2X212","121XX","11X21","1X212","X22X2","X1111","XX22X","2X1XX","22211","21122"];
        let resultadoUnicas = [];

        function ejecutarTodo() {
            const bMin = parseInt(document.getElementById('bMin').value);
            const bMax = parseInt(document.getElementById('bMax').value);
            const dMin = parseInt(document.getElementById('dMin').value);
            const dMax = parseInt(document.getElementById('dMax').value);

            // 1. Añadir el Doble (1 y 2) a las 27 apuestas -> 54 combinaciones
            let base54 = [];
            base27.forEach(ap => {
                base54.push(ap + "1");
                base54.push(ap + "2");
            });

            // 2. Filtrar por tus rangos de Bases y Difíciles
            let filtradas = base54.filter(c => {
                let n1 = (c.match(/1/g) || []).length;
                let n2 = (c.match(/2/g) || []).length;
                return (n1 >= bMin && n1 <= bMax && n2 >= dMin && n2 <= dMax);
            });

            // 3. Aplicar Huecos (-) y eliminar Duplicados Posicionales
            let setUnicas = new Set();
            let listaVisual = [];
            resultadoUnicas = [];

            filtradas.forEach(ap => {
                for (let i = 0; i < 6; i++) {
                    let conHueco = "";
                    for (let j = 0; j < 6; j++) {
                        conHueco += (i === j) ? "-" : ap[j];
                    }
                    
                    if (!setUnicas.has(conHueco)) {
                        setUnicas.add(conHueco);
                        resultadoUnicas.push(conHueco);
                        listaVisual.push(`${resultadoUnicas.length}. ${conHueco}`);
                    }
                }
            });

            // 4. Calcular Probabilidad de Éxito dentro del rango
            let exitos = 0;
            const t = ['1', 'X', '2'], d = ['1', '2'];
            let universoRango = [];
            for(let p1 of t) for(let p2 of t) for(let p3 of t) for(let p4 of t) for(let p5 of t) for(let p6 of d) {
                let c = p1+p2+p3+p4+p5+p6;
                let n1 = (c.match(/1/g) || []).length;
                let n2 = (c.match(/2/g) || []).length;
                if (n1 >= bMin && n1 <= bMax && n2 >= dMin && n2 <= dMax) {
                    universoRango.push(c);
                    let ok = false;
                    for(let b of resultadoUnicas) {
                        let rRec = "";
                        let hIdx = b.indexOf("-");
                        for(let i=0; i<6; i++) if(i !== hIdx) rRec += c[i];
                        if(rRec === b.replace("-","")) { ok = true; break; }
                    }
                    if(ok) exitos++;
                }
            }

            const porc = ((exitos / universoRango.length) * 100).toFixed(2);

            // 5. Mostrar resultados
            const stats = document.getElementById('stats');
            stats.style.display = "block";
            stats.innerHTML = `
                Apuestas Base (Filtro): ${filtradas.length} | 
                Únicas Elige 8: ${resultadoUnicas.length} | 
                <span class="prob">Garantía en Rango: ${porc}%</span>
            `;
            
            document.getElementById('log').textContent = listaVisual.join("\n");
        }

        function descargar() {
            if (resultadoUnicas.length === 0) return alert("Primero genera las apuestas");
            const blob = new Blob([resultadoUnicas.join("\n")], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'elige8_condicionado.txt';
            a.click();
        }
    </script>
</body>
</html>
