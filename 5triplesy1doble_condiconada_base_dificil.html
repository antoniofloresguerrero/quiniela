<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditor de Seguridad Elige 8 - 5T+1D</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        .control-group { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 20px; border: 1px solid #d1d9e6; }
        .input-item { display: flex; flex-direction: column; align-items: center; }
        input { width: 50px; padding: 8px; text-align: center; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; margin-top: 5px; }
        button { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #219150; transform: translateY(-2px); }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card span { display: block; font-size: 1.5em; font-weight: bold; color: #0be881; }
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
        .list { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; height: 500px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
        .match-ok { color: #27ae60; font-weight: bold; }
        .match-fail { color: #eb4d4b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Auditoría de Cobertura y Generación Elige 8</h2>
        
        <div class="control-group">
            <div class="input-item">
                <label>Bases (1) Min</label>
                <input type="number" id="bMin" value="2">
            </div>
            <div class="input-item">
                <label>Bases (1) Max</label>
                <input type="number" id="bMax" value="4">
            </div>
            <div class="input-item">
                <label>Difíciles (2) Min</label>
                <input type="number" id="dMin" value="0">
            </div>
            <div class="input-item">
                <label>Difíciles (2) Max</label>
                <input type="number" id="dMax" value="2">
            </div>
            <button onclick="auditar()">Ejecutar Auditoría</button>
        </div>

        <div class="stats-bar">
            <div class="stat-card">Apuestas Únicas Generadas <span id="countUnicas">0</span></div>
            <div class="stat-card">Cobertura en Rango <span id="countProb">0%</span></div>
            <div class="stat-card">Coste Estimado <span id="countEuros">0.00€</span></div>
        </div>

        <div class="grid">
            <div>
                <strong>PRUEBA DE SEGURIDAD (¿Qué ocurre si sale este resultado?)</strong>
                <div id="auditLog" class="list">El análisis aparecerá aquí...</div>
            </div>
            <div>
                <strong>APUESTAS A SELLAR (TXT)</strong>
                <div id="apuestasLog" class="list" style="background:#1e272e; color:#0be881;"></div>
            </div>
        </div>
    </div>

    <script>
        const base27 = ["11111","1XXXX","12222","X1X22","XXXX1","X211X","212X2","2X121","22X1X","1X12X","12X11","112X2","XX112","X2X21","X121X","221X1","21X2X","2X212","121XX","11X21","1X212","X22X2","X1111","XX22X","2X1XX","22211","21122"];

        function auditar() {
            const bMin = parseInt(document.getElementById('bMin').value);
            const bMax = parseInt(document.getElementById('bMax').value);
            const dMin = parseInt(document.getElementById('dMin').value);
            const dMax = parseInt(document.getElementById('dMax').value);

            // 1. Generar Base 54 (Reducción 27 + Doble 1-2)
            let filtradas = [];
            base27.forEach(ap => {
                [ap + "1", ap + "2"].forEach(c => {
                    let n1 = (c.match(/1/g) || []).length;
                    let n2 = (c.match(/2/g) || []).length;
                    if (n1 >= bMin && n1 <= bMax && n2 >= dMin && n2 <= dMax) filtradas.push(c);
                });
            });

            // 2. Generar Apuestas Únicas con Hueco
            let misBloques = [];
            let setUnicas = new Set();
            filtradas.forEach(ap => {
                for (let i = 0; i < 6; i++) {
                    let s = ""; for (let j = 0; j < 6; j++) s += (i === j) ? "-" : ap[j];
                    if(!setUnicas.has(s)) {
                        setUnicas.add(s);
                        misBloques.push({ full: s, signs: s.replace("-",""), hIdx: i });
                    }
                }
            });

            // 3. Auditoría de Cobertura
            const t = ['1', 'X', '2'], d = ['1', '2'];
            let auditHTML = [];
            let totalEnRango = 0, cubiertos = 0;

            for(let p1 of t) for(let p2 of t) for(let p3 of t) for(let p4 of t) for(let p5 of t) for(let p6 of d) {
                let real = p1+p2+p3+p4+p5+p6;
                let n1 = (real.match(/1/g) || []).length;
                let n2 = (real.match(/2/g) || []).length;

                if (n1 >= bMin && n1 <= bMax && n2 >= dMin && n2 <= dMax) {
                    totalEnRango++;
                    let match = null;
                    for(let b of misBloques) {
                        let rRec = ""; for(let i=0; i<6; i++) if(i !== b.hIdx) rRec += real[i];
                        if(rRec === b.signs) { match = b.full; break; }
                    }
                    if(match) {
                        cubiertos++;
                        auditHTML.push(`Resultado ${real} -> <span class="match-ok">CUBIERTO</span> por ${match}`);
                    } else {
                        auditHTML.push(`Resultado ${real} -> <span class="match-fail">SIN COBERTURA</span>`);
                    }
                }
            }

            // Actualizar Interfaz
            document.getElementById('countUnicas').innerText = misBloques.length;
            document.getElementById('countProb').innerText = ((cubiertos/totalEnRango)*100).toFixed(2) + "%";
            document.getElementById('countEuros').innerText = (misBloques.length * 0.50).toFixed(2) + "€";
            document.getElementById('apuestasLog').innerHTML = Array.from(setUnicas).map((a, i) => `${i+1}. ${a}`).join("<br>");
            document.getElementById('auditLog').innerHTML = auditHTML.join("<br>");
        }
    </script>
</body>
</html>
