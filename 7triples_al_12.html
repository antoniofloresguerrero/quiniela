<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Elige 8 - Sistema Corregido</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 15px; background: #f0f2f5; font-size: 12px; }
        .container { background: white; padding: 25px; border-radius: 15px; max-width: 1100px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background: #2c3e50; color: white; }
        .grid-filtros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        button { border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-gen { background: #27ae60; color: white; }
        .btn-esc { background: #3498db; color: white; }
        .btn-save { background: #f39c12; color: white; }
        .btn-open { background: #9b59b6; color: white; }
        .resumen-total { background: #212529; color: white; padding: 20px; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: center; }
        #panelEstadistico { background: #2c3e50; padding: 15px; border-radius: 8px; color: #f1c40f; font-family: monospace; font-size: 14px; min-height: 50px; border: 1px solid #444; }
        #listadoApuestas { width: 100%; height: 250px; margin-top: 15px; font-family: monospace; background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; overflow-y: scroll; border: 1px solid #333; }
        .linea { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 3px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Estructurador Elige 8: Corrección de Carga de Archivos</h2>
    
    <table>
        <thead>
            <tr>
                <th>P.</th><th>Prono</th><th>E8</th><th>C1</th><th>CX</th><th>C2</th><th>B / D</th><th style="background:#f39c12; color:white">REAL</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <div class="grid-filtros">
        <div><b>UNOS:</b><input type="text" id="fUnos" value="3,4,5,6" style="width:90%"></div>
        <div><b>BASES:</b><input type="text" id="fBases" value="3,4,5,6" style="width:90%"></div>
        <div><b>DIFÍCILES:</b><input type="text" id="fDificiles" value="0,1,2" style="width:90%"></div>
        <div><b>Cobertura %:</b><input type="number" id="fPct" value="100" style="width:90%"></div>
    </div>

    <div class="btn-group">
        <button class="btn-gen" onclick="generar()">GENERAR REDUCCIÓN</button>
        <button class="btn-esc" onclick="escrutar()">ESCRUTAR ACIERTOS</button>
        <button class="btn-save" onclick="guardar()">GUARDAR PROYECTO</button>
        <button class="btn-open" onclick="document.getElementById('inputOpen').click()">ABRIR PROYECTO</button>
        <input type="file" id="inputOpen" style="display:none" onchange="abrir(event)">
    </div>

    <div class="resumen-total">
        <div>
            Filtradas: <b id="outF">0</b> | Apuestas: <b id="outR">0</b><br>
            Coste: <b id="outC">0 €</b>
        </div>
        <div id="panelEstadistico">Esperando escrutinio...</div>
    </div>

    <div id="listadoApuestas"></div>
</div>

<script>
let apuestasGlobal = [];
let indicesE8 = [];

const body = document.getElementById('tablaBody');
for(let i=1; i<=14; i++) {
    body.innerHTML += `<tr>
        <td>${i}</td>
        <td><input type="text" id="p${i}" value="1X2" style="width:40px"></td>
        <td><input type="checkbox" id="chk${i}" ${i<=8?'checked':''}></td>
        <td><input type="number" step="0.1" id="q1_${i}" value="1.8" style="width:40px"></td>
        <td><input type="number" step="0.1" id="qX_${i}" value="3.2" style="width:40px"></td>
        <td><input type="number" step="0.1" id="q2_${i}" value="4.5" style="width:40px"></td>
        <td id="inf${i}" style="font-size:10px; font-weight:bold; color:#3498db">-</td>
        <td><input type="text" id="res${i}" style="width:25px; text-align:center; border:1px solid #f39c12"></td>
    </tr>`;
}

function actualizarBD() {
    let sel = []; indicesE8 = [];
    for(let i=1; i<=14; i++) {
        let q1 = parseFloat(document.getElementById(`q1_${i}`).value);
        let qX = parseFloat(document.getElementById(`qX_${i}`).value);
        let q2 = parseFloat(document.getElementById(`q2_${i}`).value);
        let qs = [{s:'1',v:q1}, {s:'X',v:qX}, {s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        document.getElementById(`inf${i}`).innerText = `B:${qs[0].s}|D:${qs[2].s}`;
        if(document.getElementById(`chk${i}`).checked) {
            sel.push({ prono: document.getElementById(`p${i}`).value.toUpperCase().split(''), base: qs[0].s, dificil: qs[2].s });
            indicesE8.push(i);
        }
    }
    return sel;
}

function generar() {
    const sel = actualizarBD();
    const uP = document.getElementById('fUnos').value.split(',').map(Number);
    const bP = document.getElementById('fBases').value.split(',').map(Number);
    const dP = document.getElementById('fDificiles').value.split(',').map(Number);
    const target = parseFloat(document.getElementById('fPct').value) / 100;

    let uni = [];
    function gen(idx, comb, u, b, d) {
        if(idx === sel.length) {
            if(uP.includes(u) && bP.includes(b) && dP.includes(d)) uni.push(comb.join(''));
            return;
        }
        sel[idx].prono.forEach(s => gen(idx+1, [...comb, s], u+(s==='1'?1:0), b+(s===sel[idx].base?1:0), d+(s===sel[idx].dificil?1:0)));
    }
    gen(0, [], 0, 0, 0);
    if(uni.length === 0) return alert("Filtro vacío.");

    let noCub = new Set(uni);
    apuestasGlobal = [];
    const n = sel.length;
    const pares = [];
    for(let i=0; i<n; i++) for(let j=i+1; j<n; j++) pares.push([i, j]);

    let pool = [...uni];
    while(noCub.size > uni.length * (1 - target) && pool.length > 0) {
        let mejor = ""; let mejorP = null; let maxC = -1; let cubiertas = [];
        for(let base of pool.slice(0, 150)) {
            for(let p of pares) {
                let curr = [];
                ['1','X','2'].forEach(h1 => ['1','X','2'].forEach(h2 => {
                    let c = base.split(''); c[p[0]]=h1; c[p[1]]=h2;
                    let s = c.join(''); if(noCub.has(s)) curr.push(s);
                }));
                if(curr.length > maxC) { maxC = curr.length; mejor = base; mejorP = p; cubiertas = curr; }
                if(maxC >= 9) break;
            }
            if(maxC >= 9) break;
        }
        if(maxC <= 0) break;
        cubiertas.forEach(s => noCub.delete(s));
        let v = mejor.split(''); v[mejorP[0]]="_"; v[mejorP[1]]="_";
        apuestasGlobal.push(v.join(''));
        pool = pool.filter(a => a !== mejor);
    }

    document.getElementById('outF').innerText = uni.length;
    document.getElementById('outR').innerText = apuestasGlobal.length;
    document.getElementById('outC').innerText = (apuestasGlobal.length * 1.25).toFixed(2) + " €";
    document.getElementById('listadoApuestas').innerHTML = apuestasGlobal.map((ap, i) => `<div class="linea"><span>[${i+1}] ${ap.split('').join(' ')}</span><span id="ac_${i}">-</span></div>`).join('');
}

function escrutar() {
    if(apuestasGlobal.length === 0) return;
    let real = indicesE8.map(idx => document.getElementById(`res${idx}`).value.toUpperCase());
    if(real.includes("")) return alert("Pon los resultados reales.");
    let conteo = Array(indicesE8.length + 1).fill(0);
    apuestasGlobal.forEach((ap, i) => {
        let a = 0; let s = ap.split('');
        for(let j=0; j<s.length; j++) if(s[j] === real[j]) a++;
        conteo[a]++;
        document.getElementById(`ac_${i}`).innerText = a + " aciertos";
    });
    let resHTML = "<b>RESUMEN:</b><br>";
    for(let i=conteo.length-1; i>=0; i--) { if(conteo[i] > 0) resHTML += `${i} ACIERTOS: ${conteo[i]} ap.<br>`; }
    document.getElementById('panelEstadistico').innerHTML = resHTML;
}

function guardar() {
    let data = { filtros: { unos: document.getElementById('fUnos').value, bases: document.getElementById('fBases').value, doses: document.getElementById('fDificiles').value }, cuotas: [] };
    for(let i=1; i<=14; i++) {
        data.cuotas.push({ c1: document.getElementById(`q1_${i}`).value, cX: document.getElementById(`qX_${i}`).value, c2: document.getElementById(`q2_${i}`).value, res: document.getElementById(`res${i}`).value, chk: document.getElementById(`chk${i}`).checked, prono: document.getElementById(`p${i}`).value });
    }
    let blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "quiniela.json"; a.click();
}

function abrir(event) {
    let file = event.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        let data = JSON.parse(e.target.result);
        document.getElementById('fUnos').value = data.filtros.unos;
        document.getElementById('fBases').value = data.filtros.bases;
        document.getElementById('fDificiles').value = data.filtros.doses;
        data.cuotas.forEach((c, i) => {
            let idx = i+1;
            document.getElementById(`q1_${idx}`).value = c.c1;
            document.getElementById(`qX_${idx}`).value = c.cX;
            document.getElementById(`q2_${idx}`).value = c.c2;
            document.getElementById(`res${idx}`).value = c.res;
            document.getElementById(`chk${idx}`).checked = c.chk;
            document.getElementById(`p${idx}`).value = c.prono || "1X2";
        });
        actualizarBD();
        alert("Proyecto cargado con éxito.");
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
