<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analizador Elige 8 - Fix Final Guardar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background: #1a202c; color: #fff; font-size: 11px; }
        .container { background: #2d3748; padding: 15px; border-radius: 10px; max-width: 1300px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header-box { background: #1a202c; padding: 8px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #4a5568; }
        .resumen-total { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; background: #2d3748; padding: 5px 15px; border-radius: 6px; border: 1px solid #4a5568; }
        .resumen-total b { color: #63b3ed; font-size: 13px; margin-left: 3px; }
        .real-stats { color: #f1c40f !important; border-left: 1px solid #4a5568; padding-left: 15px; font-weight: bold; white-space: nowrap; }
        .panel-superior { display: grid; grid-template-columns: 1fr 1fr 1fr 160px; gap: 10px; margin-bottom: 10px; }
        .filtro-seccion { background: #1a202c; padding: 6px; border-radius: 6px; border: 1px solid #4a5568; }
        .filtro-seccion h3 { font-size: 9px; color: #63b3ed; text-transform: uppercase; margin: 0 0 5px 0; border-bottom: 1px solid #4a5568; }
        .btn-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; }
        .btn-num { background: #2d3748; border: 1px solid #4a5568; color: #fff; padding: 4px 0; cursor: pointer; border-radius: 2px; font-size: 9px; font-weight: bold; }
        .btn-num.active { background: #3182ce; border-color: #63b3ed; box-shadow: 0 0 5px #3182ce; }
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 4px; }
        .btn-main { border: none; padding: 6px; cursor: pointer; font-weight: bold; border-radius: 4px; color: white; font-size: 10px; }
        .btn-gen { background: #38a169; } .btn-esc { background: #3182ce; } .btn-save { background: #d69e2e; } .btn-open { background: #805ad5; }
        table { width: 100%; border-collapse: collapse; background: #1a202c; margin-bottom: 10px; font-size: 10px; }
        th, td { padding: 3px; text-align: center; border: 1px solid #4a5568; }
        input { background: #1a202c; border: 1px solid #4a5568; color: #fff; text-align: center; font-size: 10px; width: 32px; }
        #listadoApuestas { width: 100%; height: 250px; font-family: monospace; background: #000; color: #00ff00; padding: 10px; border-radius: 5px; overflow-y: scroll; border: 1px solid #4a5568; font-size: 11px; }
        .linea { border-bottom: 1px solid #2d3748; padding: 4px; display: flex; justify-content: space-between; align-items: center; }
        .ganadora { background: #2d5a27 !important; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-box">
        <div><b>H:</b> 
            <select id="selHuecos" style="background:#2d3748; color:#fff; border:1px solid #4a5568; border-radius:4px;">
                <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option>
            </select>
        </div>
        <div style="flex-grow: 1; display: flex; align-items: center; gap: 10px;">
            <b>Cob:</b> <input type="range" id="fPct" min="1" max="100" value="100" oninput="document.getElementById('pctVal').innerText = this.value + '%'" style="flex-grow:1">
            <span id="pctVal" style="font-weight:bold; color:#63b3ed; width:35px;">100%</span>
        </div>
        <div class="resumen-total">
            <div>Filtradas:<b id="outF">0</b></div>
            <div>Apuestas:<b id="outR">0</b></div>
            <div>Coste:<b id="outC">0.00€</b></div>
            <div>Máx Ac:<b id="outMax">-</b></div>
            <div class="real-stats">REAL -> U:<b id="rUnos">-</b> | B:<b id="rBases">-</b> | D:<b id="rDificiles">-</b></div>
        </div>
    </div>
    <div class="panel-superior">
        <div class="filtro-seccion"><h3>Unos (Signo 1)</h3><div class="btn-grid" id="gridUnos"></div></div>
        <div class="filtro-seccion"><h3>Bases (Favs)</h3><div class="btn-grid" id="gridBases"></div></div>
        <div class="filtro-seccion"><h3>Difíciles (Bombas)</h3><div class="btn-grid" id="gridDificiles"></div></div>
        <div class="action-grid">
            <button class="btn-main btn-gen" onclick="generar()">GENERAR</button>
            <button class="btn-main btn-esc" onclick="escrutar()">ESCRUTAR</button>
            <button class="btn-main btn-save" onclick="guardar()">GUARDAR</button>
            <button class="btn-main btn-open" onclick="document.getElementById('inputOpen').click()">ABRIR</button>
            <input type="file" id="inputOpen" style="display:none" onchange="abrir(event)">
        </div>
    </div>
    <table id="mainTable">
        <thead><tr><th>P.</th><th>Prono</th><th>E8</th><th>C1</th><th>CX</th><th>C2</th><th>B / D</th><th style="background:#d69e2e">REAL</th></tr></thead>
        <tbody id="tablaBody"></tbody>
    </table>
    <div id="listadoApuestas"></div>
</div>
<script>
let apuestasGlobal = []; let indicesE8 = [];
const filtros = { unos: new Set(), bases: new Set(), dificiles: new Set() };
function crearBotones(id, setRef) {
    const c = document.getElementById(id); c.innerHTML = '';
    for(let i=0; i<=8; i++) {
        const b = document.createElement('button'); b.innerText = i; b.className = 'btn-num' + (setRef.has(i)?' active':'');
        b.onclick = () => { if(setRef.has(i)) setRef.delete(i); else setRef.add(i); b.classList.toggle('active'); };
        c.appendChild(b);
    }
}
crearBotones('gridUnos', filtros.unos); crearBotones('gridBases', filtros.bases); crearBotones('gridDificiles', filtros.dificiles);
const body = document.getElementById('tablaBody');
for(let i=1; i<=14; i++) {
    body.innerHTML += `<tr><td>${i}</td><td><input type="text" id="p${i}" value="1X2"></td><td><input type="checkbox" id="chk${i}" ${i<=8?'checked':''}></td><td><input type="number" step="0.1" id="q1_${i}" value="1.8" oninput="actualizarBD()"></td><td><input type="number" step="0.1" id="qX_${i}" value="3.2" oninput="actualizarBD()"></td><td><input type="number" step="0.1" id="q2_${i}" value="4.5" oninput="actualizarBD()"></td><td id="inf${i}">-</td><td><input type="text" id="res${i}" style="width:20px; background:#2d3748; border:none; color:white;"></td></tr>`;
}
function actualizarBD() {
    let sel = []; indicesE8 = [];
    for(let i=1; i<=14; i++) {
        let q1 = parseFloat(document.getElementById(`q1_${i}`).value)||0, qX = parseFloat(document.getElementById(`qX_${i}`).value)||0, q2 = parseFloat(document.getElementById(`q2_${i}`).value)||0;
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        document.getElementById(`inf${i}`).innerText = `B:${qs[0].s}|D:${qs[2].s}`;
        if(document.getElementById(`chk${i}`).checked) {
            sel.push({ p: document.getElementById(`p${i}`).value.toUpperCase().split(''), b: qs[0].s, d: qs[2].s });
            indicesE8.push(i);
        }
    }
    return sel;
}
actualizarBD();
function generar() {
    const sel = actualizarBD(); const target = parseInt(document.getElementById('fPct').value)/100; const nH = parseInt(document.getElementById('selHuecos').value);
    let uni = [];
    function gen(idx, comb, u, b, d) {
        if(idx === sel.length) {
            if((filtros.unos.size===0||filtros.unos.has(u))&&(filtros.bases.size===0||filtros.bases.has(b))&&(filtros.dificiles.size===0||filtros.dificiles.has(d))) uni.push(comb.join(''));
            return;
        }
        sel[idx].p.forEach(s => gen(idx+1, [...comb, s], u+(s==='1'?1:0), b+(s===sel[idx].b?1:0), d+(s===sel[idx].d?1:0)));
    }
    gen(0, [], 0, 0, 0);
    if(!uni.length) return alert("Filtro sin resultados.");
    document.getElementById('outF').innerText = uni.length;
    let noCub = new Set(uni); apuestasGlobal = [];
    const hCombos = []; function cber(s, a) { if(a.length===nH){hCombos.push([...a]);return;} for(let i=s;i<sel.length;i++) cber(i+1, [...a,i]); }
    cber(0, []);
    while(noCub.size > uni.length*(1-target) && apuestasGlobal.length < uni.length) {
        let mejorA = "", mejorHS = null, maxC = -1, mejoresC = [];
        let pool = Array.from(noCub).slice(0, 300);
        for(let bStr of pool) {
            for(let hs of hCombos) {
                let cur = []; function chk(hI, cb) {
                    if(hI===nH) { let s = cb.join(''); if(noCub.has(s)) cur.push(s); return; }
                    ['1','X','2'].forEach(sig => { let ncb = [...cb]; ncb[hs[hI]] = sig; chk(hI+1, ncb); });
                }
                chk(0, bStr.split(''));
                if(cur.length > maxC) { maxC = cur.length; mejorA = bStr; mejorHS = hs; mejoresC = cur; }
                if(maxC >= Math.pow(3, nH)) break;
            }
            if(maxC >= Math.pow(3, nH)) break;
        }
        if(maxC <= 0) break;
        mejoresC.forEach(s => noCub.delete(s));
        let v = mejorA.split(''); mejorHS.forEach(idx => v[idx] = "_");
        apuestasGlobal.push({ s: v.join(''), ac: 0 });
    }
    document.getElementById('outR').innerText = apuestasGlobal.length;
    document.getElementById('outC').innerText = (apuestasGlobal.length*1.25).toFixed(2)+"€";
    render();
}
function render() {
    let max = apuestasGlobal.length?Math.max(...apuestasGlobal.map(a=>a.ac)):0;
    document.getElementById('listadoApuestas').innerHTML = apuestasGlobal.map((a, i) => `<div class="linea ${a.ac>0&&a.ac===max?'ganadora':''}"><span>[${i+1}] ${a.s.split('').join(' ')}</span><span style="color:#63b3ed; font-weight:bold;">${a.ac} ac.</span></div>`).join('');
}
function escrutar() {
    if(!apuestasGlobal.length) return;
    let rU=0, rB=0, rD=0;
    let real = indicesE8.map(idx => {
        let v = (document.getElementById(`res${idx}`).value || "").toUpperCase();
        if(v === '1') rU++;
        let q1=parseFloat(document.getElementById(`q1_${idx}`).value), qX=parseFloat(document.getElementById(`qX_${idx}`).value), q2=parseFloat(document.getElementById(`q2_${idx}`).value);
        let qs = [{s:'1',v:q1},{s:'X',v:qX},{s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        if(v === qs[0].s) rB++; if(v === qs[2].s) rD++; return v;
    });
    if(real.includes("")) return alert("Pon resultados REAL.");
    document.getElementById('rUnos').innerText = rU; document.getElementById('rBases').innerText = rB; document.getElementById('rDificiles').innerText = rD;
    apuestasGlobal.forEach(a => {
        let c = 0, s = a.s.split('');
        for(let j=0; j<s.length; j++) if(s[j] !== "_" && s[j] === real[j]) c++;
        a.ac = c;
    });
    apuestasGlobal.sort((a,b) => b.ac - a.ac);
    document.getElementById('outMax').innerText = apuestasGlobal[0].ac;
    render();
}
function guardar() {
    let d = { f: { u:[...filtros.unos], b:[...filtros.bases], d:[...filtros.dificiles], p:document.getElementById('fPct').value }, c: [] };
    for(let i=1; i<=14; i++) {
        let p = document.getElementById(`p${i}`), q1 = document.getElementById(`q1_${i}`), qX = document.getElementById(`qX_${i}`), q2 = document.getElementById(`q2_${i}`), r = document.getElementById(`res${i}`), ch = document.getElementById(`chk${i}`);
        d.c.push({ p: p?p.value:'', q1: q1?q1.value:'', qX: qX?qX.value:'', q2: q2?q2.value:'', r: r?r.value:'', chk: ch?ch.checked:false });
    }
    let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:"application/json"})); a.download="elige8.json"; a.click();
}
function abrir(ev) {
    if(!ev.target.files.length) return;
    let r = new FileReader();
    r.onload = (e) => {
        let d = JSON.parse(e.target.result); let f = d.f || {};
        filtros.unos = new Set(f.u || []); filtros.bases = new Set(f.b || []); filtros.dificiles = new Set(f.d || []);
        document.getElementById('fPct').value = f.p || 100; document.getElementById('pctVal').innerText = (f.p || 100) + "%";
        crearBotones('gridUnos', filtros.unos); crearBotones('gridBases', filtros.bases); crearBotones('gridDificiles', filtros.dificiles);
        (d.c || []).forEach((c, i) => { 
            let idx = i+1; 
            if(document.getElementById(`p${idx}`)) document.getElementById(`p${idx}`).value = c.p || "1X2";
            if(document.getElementById(`q1_${idx}`)) document.getElementById(`q1_${idx}`).value = c.q1 || "1.8";
            if(document.getElementById(`qX_${idx}`)) document.getElementById(`qX_${idx}`).value = c.qX || "3.2";
            if(document.getElementById(`q2_${idx}`)) document.getElementById(`q2_${idx}`).value = c.q2 || "4.5";
            if(document.getElementById(`res${idx}`)) document.getElementById(`res${idx}`).value = c.r || "";
            if(document.getElementById(`chk${idx}`)) document.getElementById(`chk${idx}`).checked = c.chk || false;
        });
        actualizarBD(); alert("Cargado.");
    };
    r.readAsText(ev.target.files[0]);
}
</script>
</body>
</html>
