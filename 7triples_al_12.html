<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estructurador Elige 8 </title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 15px; background: #f0f2f5; font-size: 12px; }
        .container { background: white; padding: 25px; border-radius: 15px; max-width: 1150px; margin: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background: #2c3e50; color: white; }
        .grid-filtros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        button { border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-gen { background: #27ae60; color: white; }
        .btn-esc { background: #3498db; color: white; }
        .btn-save { background: #f39c12; color: white; }
        .btn-open { background: #9b59b6; color: white; }
        .resumen-contenedor { background: #212529; color: white; padding: 20px; border-radius: 10px; display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: center; margin-top: 10px; }
        .stats-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .card-acierto { padding: 8px 12px; border-radius: 6px; text-align: center; min-width: 70px; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .rank-8 { background: #FFD700; color: #000; } .rank-7 { background: #C0C0C0; color: #000; } .rank-6 { background: #CD7F32; color: #fff; } .rank-low { background: #555; color: #ccc; }
        .card-acierto big { display: block; font-size: 18px; font-weight: bold; }
        #listadoApuestas { width: 100%; height: 300px; margin-top: 15px; font-family: monospace; background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; overflow-y: scroll; border: 1px solid #333; }
        .linea { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 4px 10px; }
        .ganadora { background: #2d5a27; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Analizador Elige 8</h2>
    
    <table id="mainTable">
        <thead>
            <tr>
                <th>P.</th><th>Pronóstico</th><th>E8</th><th>1</th><th>X</th><th>2</th><th>B / D</th><th style="background:#f39c12; color:white">REAL</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <div class="grid-filtros">
        <div><b>UNOS:</b><input type="text" id="fUnos" value="3,4,5,6"></div>
        <div><b>BASES:</b><input type="text" id="fBases" value="3,4,5,6"></div>
        <div><b>DIFÍCILES:</b><input type="text" id="fDificiles" value="0,1,2"></div>
        <div><b>Cobertura %:</b><input type="number" id="fPct" value="100"></div>
    </div>

    <div class="btn-group">
        <button class="btn-gen" onclick="generar()">1. GENERAR REDUCCIÓN</button>
        <button class="btn-esc" onclick="escrutar()">2. ESCRUTAR Y ORDENAR</button>
        <button class="btn-save" onclick="guardar()">GUARDAR</button>
        <button class="btn-open" onclick="document.getElementById('inputOpen').click()">ABRIR</button>
        <input type="file" id="inputOpen" style="display:none" onchange="abrir(event)">
    </div>

    <div class="resumen-contenedor">
        <div>
            Filtradas: <b id="outF">0</b><br>
            Apuestas: <b id="outR">0</b><br>
            Coste: <b id="outC" style="color:#2ecc71">0 €</b>
        </div>
        <div id="statsVisual" class="stats-grid"></div>
    </div>

    <div id="listadoApuestas"></div>
</div>

<script>
let apuestasGlobal = [];
let indicesE8 = [];

const body = document.getElementById('tablaBody');
for(let i=1; i<=14; i++) {
    body.innerHTML += `<tr>
        <td>${i}</td>
        <td><input type="text" id="p${i}" value="1X2" style="width:45px"></td>
        <td><input type="checkbox" id="chk${i}" ${i<=8?'checked':''}></td>
        <td><input type="number" step="0.1" id="q1_${i}" value="1.8" style="width:40px"></td>
        <td><input type="number" step="0.1" id="qX_${i}" value="3.2" style="width:40px"></td>
        <td><input type="number" step="0.1" id="q2_${i}" value="4.5" style="width:40px"></td>
        <td id="inf${i}" style="font-size:10px; font-weight:bold; color:#3498db">-</td>
        <td><input type="text" id="res${i}" style="width:25px; text-align:center; border:1px solid #f39c12"></td>
    </tr>`;
}

function actualizarBD() {
    let sel = []; indicesE8 = [];
    for(let i=1; i<=14; i++) {
        let q1 = parseFloat(document.getElementById(`q1_${i}`).value) || 2.0;
        let qX = parseFloat(document.getElementById(`qX_${i}`).value) || 3.0;
        let q2 = parseFloat(document.getElementById(`q2_${i}`).value) || 4.0;
        let qs = [{s:'1',v:q1}, {s:'X',v:qX}, {s:'2',v:q2}].sort((a,b)=>a.v-b.v);
        document.getElementById(`inf${i}`).innerText = `B:${qs[0].s}|D:${qs[2].s}`;
        if(document.getElementById(`chk${i}`).checked) {
            let pronoVal = document.getElementById(`p${i}`).value || "1X2";
            sel.push({ prono: pronoVal.toUpperCase().split(''), base: qs[0].s, dificil: qs[2].s });
            indicesE8.push(i);
        }
    }
    return sel;
}

function generar() {
    const sel = actualizarBD();
    const uP = (document.getElementById('fUnos').value || "0").split(',').map(Number);
    const bP = (document.getElementById('fBases').value || "0").split(',').map(Number);
    const dP = (document.getElementById('fDificiles').value || "0").split(',').map(Number);
    const target = (parseFloat(document.getElementById('fPct').value) || 100) / 100;

    let uni = [];
    function gen(idx, comb, u, b, d) {
        if(idx === sel.length) {
            if(uP.includes(u) && bP.includes(b) && dP.includes(d)) uni.push(comb.join(''));
            return;
        }
        sel[idx].prono.forEach(s => gen(idx+1, [...comb, s], u+(s==='1'?1:0), b+(s===sel[idx].base?1:0), d+(s===sel[idx].dificil?1:0)));
    }
    gen(0, [], 0, 0, 0);
    if(uni.length === 0) return alert("Filtro vacío. Revisa tus condiciones.");

    let noCub = new Set(uni); apuestasGlobal = [];
    const n = sel.length; const pares = [];
    for(let i=0; i<n; i++) for(let j=i+1; j<n; j++) pares.push([i, j]);

    let pool = [...uni];
    while(noCub.size > uni.length * (1 - target) && pool.length > 0) {
        let mejor = ""; let mejorP = null; let maxC = -1; let cubiertas = [];
        for(let base of pool.slice(0, 150)) {
            for(let p of pares) {
                let curr = [];
                ['1','X','2'].forEach(h1 => { ['1','X','2'].forEach(h2 => {
                    let c = base.split(''); c[p[0]]=h1; c[p[1]]=h2;
                    let s = c.join(''); if(noCub.has(s)) curr.push(s);
                });});
                if(curr.length > maxC) { maxC = curr.length; mejor = base; mejorP = p; cubiertas = curr; }
                if(maxC >= 9) break;
            }
            if(maxC >= 9) break;
        }
        if(maxC <= 0) break;
        cubiertas.forEach(s => noCub.delete(s));
        let v = mejor.split(''); v[mejorP[0]]="_"; v[mejorP[1]]="_";
        apuestasGlobal.push({ signos: v.join(''), aciertos: 0 });
        pool = pool.filter(a => a !== mejor);
    }
    document.getElementById('outF').innerText = uni.length;
    document.getElementById('outR').innerText = apuestasGlobal.length;
    document.getElementById('outC').innerText = (apuestasGlobal.length * 1.25).toFixed(2) + " €";
    renderizarListado();
}

function renderizarListado() {
    let maxA = apuestasGlobal.length > 0 ? Math.max(...apuestasGlobal.map(a => a.aciertos)) : 0;
    document.getElementById('listadoApuestas').innerHTML = apuestasGlobal.map((ap, i) => `
        <div class="linea ${ap.aciertos > 0 && ap.aciertos === maxA ? 'ganadora' : ''}">
            <span>[${i+1}] ${ap.signos.split('').join(' ')}</span>
            <span style="color:#f1c40f; font-weight:bold;">${ap.aciertos} aciertos</span>
        </div>`).join('');
}

function escrutar() {
    if(apuestasGlobal.length === 0) return;
    let real = indicesE8.map(idx => (document.getElementById(`res${idx}`).value || "").toUpperCase());
    if(real.includes("")) return alert("Pon los resultados reales.");

    let conteo = Array(indicesE8.length + 1).fill(0);
    apuestasGlobal.forEach(ap => {
        let a = 0; let s = ap.signos.split('');
        for(let j=0; j<s.length; j++) if(s[j] === real[j]) a++;
        ap.aciertos = a;
        conteo[a]++;
    });

    apuestasGlobal.sort((a, b) => b.aciertos - a.aciertos);
    let gridHTML = "";
    for(let i=indicesE8.length; i>=0; i--) {
        if(conteo[i] > 0 || i >= indicesE8.length - 1) {
            let color = i === indicesE8.length ? 'rank-8' : (i === indicesE8.length-1 ? 'rank-7' : (i === indicesE8.length-2 ? 'rank-6' : 'rank-low'));
            gridHTML += `<div class="card-acierto ${color}"><small>${i} AC.</small><big>${conteo[i]}</big></div>`;
        }
    }
    document.getElementById('statsVisual').innerHTML = gridHTML;
    renderizarListado();
}

function guardar() {
    let data = { filtros: { u: document.getElementById('fUnos').value, b: document.getElementById('fBases').value, d: document.getElementById('fDificiles').value, p: document.getElementById('fPct').value }, cuotas: [] };
    for(let i=1; i<=14; i++) {
        data.cuotas.push({
            c1: document.getElementById(`q1_${i}`).value,
            cX: document.getElementById(`qX_${i}`).value,
            c2: document.getElementById(`q2_${i}`).value,
            res: document.getElementById(`res${i}`).value,
            chk: document.getElementById(`chk${i}`).checked,
            p: document.getElementById(`p${i}`).value
        });
    }
    let a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type:"application/json"}));
    a.download="mi_quiniela.json"; a.click();
}

function abrir(event) {
    let file = event.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(e) {
        let d = JSON.parse(e.target.result);
        document.getElementById('fUnos').value = d.filtros.u || "";
        document.getElementById('fBases').value = d.filtros.b || "";
        document.getElementById('fDificiles').value = d.filtros.d || "";
        document.getElementById('fPct').value = d.filtros.p || "100";
        d.cuotas.forEach((c, i) => {
            let idx = i+1;
            document.getElementById(`q1_${idx}`).value = c.c1;
            document.getElementById(`qX_${idx}`).value = c.cX;
            document.getElementById(`q2_${idx}`).value = c.c2;
            document.getElementById(`res${idx}`).value = c.res || "";
            document.getElementById(`chk${idx}`).checked = c.chk;
            document.getElementById(`p${idx}`).value = c.p || "1X2";
        });
        actualizarBD();
        alert("Proyecto cargado sin errores.");
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
